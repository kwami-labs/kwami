version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kwami-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kwami}
      POSTGRES_USER: ${POSTGRES_USER:-kwami_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:--E UTF8}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kwami_user} -d ${POSTGRES_DB:-kwami}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kwami-network

volumes:
  postgres_data:
    driver: local

networks:
  kwami-network:
    driver: bridge
