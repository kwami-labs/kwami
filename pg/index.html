  <div id="app">
    <!-- Mobile Sidebar Close Button (fixed, visible only when sidebar is open) -->
    <button class="sidebar-close-btn" onclick="toggleMenus()" title="Close sidebar">✕</button>

    <div id="left-sidebar">
      <!-- Mobile Sidebar Tabs (visible on mobile only) -->
      <div class="mobile-sidebar-tabs">

          🧠 Mind
        </button>
        <button class="mobile-sidebar-tab" data-section="body" onclick="switchMobileSidebarTab('body')">
          🧬 Body
        </button>
        <button class="mobile-sidebar-tab" data-section="soul" onclick="switchMobileSidebarTab('soul')">
          ✨ Soul
        </button>
      </div>
      
      <button class="swap-button" id="left-swap-btn" onclick="swapLeftSidebar()">
        <span id="left-swap-text">Soul</span>
      </button>
      <div id="left-content"></div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container">

            <input type="range" id="resolution" min="120" max="220" step="1" value="180">
            <small class="checkbox-hint">Higher = smoother surface, lower = faceted look</small>
          </div>

          <div>
            <label>
              <input type="checkbox" id="wireframe">
              Wireframe Mode
            </label>
            <small class="parameter-info">Show the mesh structure</small>
          </div>
        </div>

      </div>

      <!-- Scale & Camera -->
      <div class="section">
        <div class="section-title">📐 Scale & Camera</div>
        <div class="parameter-group">
          <div class="parameter-group-title">Global Scale</div>
          <div class="slider-control">
            <label>Scale <span class="value-display" id="scale-value">3.2</span></label>
            <input type="range" id="scale" min="3" max="8" step="0.1" value="3.2">
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Camera Orbit</div>
          <p class="parameter-info">Fine-tune the default camera orbit around the blob.</p>
          <div class="slider-control">
            <label>X <span class="value-display" id="camera-x-value">-0.9</span></label>
            <input type="range" id="camera-x" min="-20" max="20" step="0.5" value="-0.9">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="camera-y-value">7.3</span></label>
            <input type="range" id="camera-y" min="-20" max="20" step="0.5" value="7.3">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="camera-z-value">-1.8</span></label>
            <input type="range" id="camera-z" min="-20" max="30" step="0.5" value="-1.8">
          </div>
        </div>
      </div>

      <!-- Audio Effects Configuration -->
      <div class="section">
        <div class="section-title">🎵 Audio Effects</div>
        
        <!-- Audio Effect Multipliers -->
        <div class="parameter-group">
          <div class="parameter-group-title">Frequency Modulation</div>
          <p class="parameter-info">Boost how strongly each frequency band pushes the blob. <span style="display:block;color:#999;font-size:11px;">The blob remembers your settings per skin.</span></p>
          <div class="slider-control">
            <label>Bass Movement <span class="value-display" id="audio-bass-spike-value">0.65</span></label>
            <input type="range" id="audio-bass-spike" min="0" max="1" step="0.05" value="0.65">
          </div>
          <div class="slider-control">
            <label>Mid Flow <span class="value-display" id="audio-mid-spike-value">0.50</span></label>
            <input type="range" id="audio-mid-spike" min="0" max="1" step="0.05" value="0.50">
          </div>
          <div class="slider-control">
            <label>High Detail <span class="value-display" id="audio-high-spike-value">0.38</span></label>
            <input type="range" id="audio-high-spike" min="0" max="1" step="0.05" value="0.38">
          </div>
          <div class="slider-control">
            <label>Audio Reactivity <span class="value-display" id="audio-reactivity-value">1.90</span></label>
            <input type="range" id="audio-reactivity" min="0.5" max="3" step="0.05" value="1.90">
          </div>
          <div class="slider-control">
            <label>Sensitivity Threshold <span class="value-display" id="audio-sensitivity-value">0.08</span></label>
            <input type="range" id="audio-sensitivity" min="0.01" max="0.3" step="0.005" value="0.08">
          </div>
          <div class="slider-control">
            <label>Breathing (Idle) <span class="value-display" id="audio-breathing-value">0.04</span></label>
            <input type="range" id="audio-breathing" min="0" max="0.1" step="0.005" value="0.04">
          </div>
        </div>

        <!-- Time Modulation -->
        <div class="parameter-group">
          <div class="parameter-group-title">Time Modulation</div>
          <p class="parameter-info">Control how audio affects animation speed</p>
          <div class="input-group">
            <label>
              <input type="checkbox" id="audio-time-enabled">
              Enable Time Modulation (Can be chaotic)
            </label>
          </div>
          <div class="slider-control">
            <label>Mid Speed <span class="value-display" id="audio-mid-time-value">0.10</span></label>
            <input type="range" id="audio-mid-time" min="0" max="2" step="0.05" value="0.10">
          </div>
          <div class="slider-control">
            <label>High Speed <span class="value-display" id="audio-high-time-value">0.18</span></label>
            <input type="range" id="audio-high-time" min="0" max="2" step="0.05" value="0.18">
          </div>
          <div class="slider-control">
            <label>Ultra Speed <span class="value-display" id="audio-ultra-time-value">0.08</span></label>
            <input type="range" id="audio-ultra-time" min="0" max="2" step="0.05" value="0.08">
          </div>
        </div>

        <!-- Audio Analyzer Settings -->
        <div class="parameter-group">
          <div class="parameter-group-title">Audio Analyzer</div>
          <div class="slider-control">
            <label>FFT Size <span class="value-display" id="fft-size-value">2048</span></label>
            <select id="fft-size">
              <option value="512">512 (Fast, Low Res)</option>
              <option value="1024">1024 (Balanced)</option>
              <option value="2048" selected>2048 (Default)</option>
              <option value="4096">4096 (High Res)</option>
            </select>
          </div>
          <div class="slider-control">
            <label>Smoothing <span class="value-display" id="smoothing-value">0.35</span></label>
            <input type="range" id="smoothing" min="0" max="1" step="0.05" value="0.35">
          </div>
        </div>

        <!-- Audio Reactive Toggle -->
        <div class="input-group">
          <label>
            <input type="checkbox" id="audio-reactive" checked>
            Enable Audio Reactivity
          </label>
        </div>
      </div>

      <!-- Interaction Configuration -->
      <div class="section">
        <div class="section-title">👆 Interaction</div>
        
        <!-- Touch/Click Effects -->
        <div class="parameter-group">
          <div class="parameter-group-title">Touch/Click Effects</div>
          <div class="input-group">
            <label>
              <input type="checkbox" id="click-interaction" checked>
              Enable Click Interaction
            </label>
          </div>
          <div class="slider-control">
            <label>Touch Strength <span class="value-display" id="touch-strength-value">1.0</span></label>
            <input type="range" id="touch-strength" min="0.1" max="2" step="0.1" value="1.0">
          </div>
          <div class="slider-control">
            <label>Touch Duration <span class="value-display" id="touch-duration-value">1100</span>ms</label>
            <input type="range" id="touch-duration" min="500" max="3000" step="100" value="1100">
          </div>
          <div class="slider-control">
            <label>Max Touch Points <span class="value-display" id="max-touches-value">5</span></label>
            <input type="range" id="max-touches" min="1" max="10" step="1" value="5">
          </div>
        </div>

        <!-- State Transitions -->
        <div class="parameter-group">
          <div class="parameter-group-title">State Transitions</div>
          <div class="slider-control">
            <label>Transition Speed <span class="value-display" id="transition-speed-value">0.05</span></label>
            <input type="range" id="transition-speed" min="0.01" max="0.2" step="0.01" value="0.05">
          </div>
          <div class="slider-control">
            <label>Thinking Duration <span class="value-display" id="thinking-duration-value">10</span>s</label>
            <input type="range" id="thinking-duration" min="3" max="30" step="1" value="10">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="section">
        <div class="section-title">⚡ Actions</div>
        <button class="button-secondary" onclick="exportGLB()">💾 Download GLB</button>
        <button class="button-secondary" onclick="testThinking()">🤔 Test Thinking Mode</button>
        <button class="button-secondary" onclick="testListening()">👂 Test Listening Mode</button>
      </div>
    </div>
  </template>

  <!-- Soul Section (Personality Configuration) -->
  <template id="soul-template">
    <div class="sidebar-content">
      <h2>✨ Soul</h2>
      <p class="subtitle">Personality Configuration</p>

      <!-- Personality Selector -->
      <div class="section">
        <div class="section-title">🎭 Load Personality</div>
        <p class="about-text">Select a preset personality or load a custom saved configuration.</p>
        
        <div class="input-group">
          <label>Personality Template</label>
          <select id="personality-selector" onchange="loadPersonalityFromSelector()">
            <option value="">-- Select Personality --</option>
            <optgroup label="🌟 Core Templates">
              <option value="friendly">😊 Kaya (Friendly)</option>
              <option value="playful">✨ Spark (Playful)</option>
              <option value="professional">💼 Nexus (Professional)</option>
            </optgroup>
            <optgroup label="🎨 Creative & Inspiring">
              <option value="mentor">📚 Sage (Mentor)</option>
              <option value="adventurer">🗺️ Atlas (Adventurer)</option>
              <option value="coach">🔥 Phoenix (Coach)</option>
              <option value="artistic">🎨 Muse (Artistic)</option>
              <option value="storyteller">📖 Fable (Storyteller)</option>
            </optgroup>
            <optgroup label="🧠 Analytical & Thoughtful">
              <option value="scientist">🔬 Quill (Scientist)</option>
              <option value="detective">🔍 Sherlock (Detective)</option>
              <option value="witty">💬 Clever (Witty)</option>
              <option value="mysterious">🌑 Eclipse (Mysterious)</option>
            </optgroup>
            <optgroup label="💙 Calm & Supportive">
              <option value="zen">🧘 Zen (Mindful)</option>
              <option value="empathic">💙 Haven (Empathic)</option>
            </optgroup>
            <optgroup label="🚀 Bold & Unconventional">
              <option value="rebel">🚀 Rogue (Rebel)</option>
            </optgroup>
            <optgroup label="😤 Challenging Personalities">
              <option value="grumpy">😤 Grump (Grumpy)</option>
              <option value="cynical">😒 Cynic (Cynical)</option>
              <option value="sarcastic">🙄 Snark (Sarcastic)</option>
              <option value="melancholic">😔 Noir (Melancholic)</option>
              <option value="angry">😡 Fury (Angry)</option>
            </optgroup>
            <optgroup label="💾 Saved Personalities" id="saved-personalities-group">
              <!-- Dynamically populated from localStorage -->
            </optgroup>
          </select>
        </div>

        <div class="input-group">
          <label>Current: &nbsp;<strong id="personality-name">Kwami</strong></label>
        </div>
      </div>

      <!-- Basic Configuration -->
      <div class="section">
        <div class="section-title">⚙️ Basic Configuration</div>
        
        <div class="input-group">
          <label>Name</label>
          <input type="text" id="soul-name" value="Kwami" placeholder="Kwami's name" oninput="autoUpdateSoul()">
        </div>

        <div class="input-group">
          <label>Personality Description</label>
          <textarea id="soul-personality" placeholder="Describe Kwami's personality..." oninput="autoUpdateSoul()">Friendly, helpful, and curious AI companion.</textarea>
        </div>

        <div class="input-group">
          <label>System Prompt</label>
          <textarea id="soul-system-prompt" placeholder="Base instructions for AI behavior..." style="min-height: 100px;" oninput="autoUpdateSoul()">You are Kwami, a friendly AI companion.</textarea>
        </div>
      </div>

      <!-- Emotional Traits Section -->
      <div class="section">
        <div class="section-title">🎭 Emotional Traits</div>
        <p class="about-text">Adjust emotional dimensions (-100 to +100). Drag sliders to set each trait.</p>
        
        <!-- Happiness/Sadness -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">😢 Sadness</span>
            <span id="happiness-value" class="trait-value">0</span>
            <span class="trait-label-right">Happiness 😊</span>
          </div>
          <input type="range" id="happiness-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('happiness', this.value)">
        </div>

        <!-- Energy/Exhaustion -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">😴 Exhaustion</span>
            <span id="energy-value" class="trait-value">0</span>
            <span class="trait-label-right">Energy ⚡</span>
          </div>
          <input type="range" id="energy-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('energy', this.value)">
        </div>

        <!-- Confidence/Anxiety -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">😰 Anxiety</span>
            <span id="confidence-value" class="trait-value">0</span>
            <span class="trait-label-right">Confidence 💪</span>
          </div>
          <input type="range" id="confidence-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('confidence', this.value)">
        </div>

        <!-- Calmness/Anger -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">😡 Anger</span>
            <span id="calmness-value" class="trait-value">0</span>
            <span class="trait-label-right">Calmness 🧘</span>
          </div>
          <input type="range" id="calmness-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('calmness', this.value)">
        </div>

        <!-- Optimism/Pessimism -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">😞 Pessimism</span>
            <span id="optimism-value" class="trait-value">0</span>
            <span class="trait-label-right">Optimism 🌟</span>
          </div>
          <input type="range" id="optimism-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('optimism', this.value)">
        </div>

        <!-- Socialness/Shyness -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">🙈 Shyness</span>
            <span id="socialness-value" class="trait-value">0</span>
            <span class="trait-label-right">Socialness 🤝</span>
          </div>
          <input type="range" id="socialness-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('socialness', this.value)">
        </div>

        <!-- Creativity/Rigidity -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">📏 Rigidity</span>
            <span id="creativity-value" class="trait-value">0</span>
            <span class="trait-label-right">Creativity 🎨</span>
          </div>
          <input type="range" id="creativity-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('creativity', this.value)">
        </div>

        <!-- Patience/Impatience -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">⏱️ Impatience</span>
            <span id="patience-value" class="trait-value">0</span>
            <span class="trait-label-right">Patience ⏳</span>
          </div>
          <input type="range" id="patience-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('patience', this.value)">
        </div>

        <!-- Empathy/Selfishness -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">🙅 Selfishness</span>
            <span id="empathy-value" class="trait-value">0</span>
            <span class="trait-label-right">Empathy 💖</span>
          </div>
          <input type="range" id="empathy-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('empathy', this.value)">
        </div>

        <!-- Curiosity/Indifference -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">😑 Indifference</span>
            <span id="curiosity-value" class="trait-value">0</span>
            <span class="trait-label-right">Curiosity 🔍</span>
          </div>
          <input type="range" id="curiosity-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('curiosity', this.value)">
        </div>

        <button class="button-secondary" onclick="resetEmotionalTraits()">🔄 Reset to Neutral</button>
      </div>

      <!-- Save Configuration Section -->
      <div class="section">
        <div class="section-title">💾 Save Configuration</div>
        <p class="about-text">Save your custom personality configuration for future use.</p>
        
        <div class="input-group">
          <label>Configuration Name</label>
          <input type="text" id="save-config-name" placeholder="My Custom Personality" value="">
        </div>

        <button class="button-primary" onclick="savePersonalityConfig()">💾 Save Personality</button>
        <button class="button-secondary" onclick="deleteSavedPersonality()">🗑️ Delete Selected</button>
      </div>

      <!-- Skills Section -->
      <div class="section" style="margin-top: 20px; border-top: 2px solid var(--border-section); padding-top: 20px;">
        <div class="section-title">👩🏻‍💻 Skills</div>
        <p class="subtitle">Program Kwami's Behavior</p>

        <!-- Available Skills -->
        <div class="section">
          <div class="parameter-group">
            <div class="parameter-group-title">Available Skills</div>
            <p style="color: #888; font-size: 12px; margin-bottom: 10px;">
              Pre-built behavior templates
            </p>
            
            <div class="input-group">
              <label>Select Skill</label>
              <select id="skill-selector">
                <option value="">-- Choose a skill --</option>
                <option value="minimize-top-right">🔽 Minimize to Top Right</option>
                <option value="rainbow-transition">🌈 Rainbow Transition</option>
                <option value="energetic-mode">⚡ Energetic Mode</option>
                <option value="calm-meditation">🧘 Calm Meditation</option>
                <option value="focus-session">🎯 Focus Session</option>
                <option value="party-mode">🎉 Party Mode</option>
              </select>
            </div>

            <div id="skill-description" style="padding: 12px; background: var(--bg-section); border-radius: 8px; margin: 10px 0; display: none;">
              <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 8px;">
                <strong id="skill-description-name"></strong>
              </div>
              <div style="font-size: 11px; color: var(--text-tertiary);" id="skill-description-text"></div>
              <div style="font-size: 10px; color: var(--text-tertiary); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-input);">
                <div><strong>Actions:</strong> <span id="skill-description-actions">0</span></div>
                <div><strong>Auto-reverse:</strong> <span id="skill-description-reverse">No</span></div>
              </div>
            </div>

            <button onclick="executeSelectedSkill()" id="execute-skill-btn" disabled>
              ▶️ Execute Skill
            </button>

            <div id="skill-execution-status" style="margin-top: 10px; display: none;">
              <div style="padding: 10px; background: var(--bg-section); border-radius: 8px; border-left: 3px solid #4CAF50;">
                <div style="font-size: 12px; color: #4CAF50; font-weight: 600;">
                  <span id="skill-execution-message">Skill executed successfully</span>
                </div>
                <div style="font-size: 11px; color: var(--text-tertiary); margin-top: 4px;">
                  Duration: <span id="skill-execution-duration">0ms</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Custom Skill Creator -->
        <div class="section">
          <div class="parameter-group">
            <div class="parameter-group-title">Skills templates</div>
            <p style="color: #888; font-size: 12px; margin-bottom: 10px;">
              Some examples of Kwami's skills with configurable templates
            </p>

            <div class="button-row">
              <button class="button-secondary" onclick="quickSkillMinimize()" title="Minimize Kwami">
                🔽 Minimize
              </button>
              <button class="button-secondary" onclick="quickSkillCenter()" title="Center Kwami">
                🎯 Center
              </button>
            </div>

            <div class="button-row" style="margin-top: 8px;">
              <button class="button-secondary" onclick="quickSkillEnergize()" title="Energetic mode">
                ⚡ Energize
              </button>
              <button class="button-secondary" onclick="quickSkillCalm()" title="Calm mode">
                🧘 Calm
              </button>
            </div>

            <div class="button-row" style="margin-top: 8px;">
              <button class="button-secondary" onclick="quickSkillParty()" title="Party mode">
                🎉 Party
              </button>
              <button class="button-secondary" onclick="quickSkillReset()" title="Reset to default">
                🔄 Reset
              </button>
            </div>
          </div>
        </div>

        <!-- Load Custom Skill -->
        <div class="section">
          <div class="parameter-group">
            <div class="parameter-group-title">Load Custom Skill</div>
            <p style="color: #888; font-size: 12px; margin-bottom: 10px;">
              You can create your own skills by loading them from JSON or YAML files or URLs
            </p>

            <div class="input-group">
              <label>Skill URL</label>
              <input type="text" id="custom-skill-url" placeholder="https://example.com/skill.json">
            </div>

            <button class="button-secondary" onclick="loadCustomSkill()" id="load-skill-btn">
              📥 Load Skill
            </button>

            <div style="margin-top: 10px;">
              <small style="color: #888;">
                Or upload: <input type="file" id="skill-file-input" accept=".json" style="display: none;" onchange="loadSkillFromFile(event)">
                <button class="button-secondary" onclick="document.getElementById('skill-file-input').click()" style="width: auto; padding: 6px 12px; margin: 0; font-size: 12px;">
                  📁 Choose File
                </button>
              </small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="/src/agent-management-functions.ts"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
