
name: 📦 Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'src/**'
      - 'index.ts'
      - '.github/workflows/publish.yml'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          git checkout HEAD~1 -- package.json 2>/dev/null || echo "First commit"
          PREVIOUS_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.0.0")
          git checkout HEAD -- package.json
          
          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"
          
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed - will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged - skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: check-version
    if: needs.check-version.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm provenance
    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test
        continue-on-error: false

      - name: 🔨 Build package
        run: npm run build

      - name: 🔍 Verify build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory not found after build"
            exit 1
          fi
          echo "✅ Build artifacts verified"

      - name: 📝 Prepare for publish
        run: |
          # Update main entry point to dist for npm package
          node -e "
            const pkg = require('./package.json');
            pkg.main = 'dist/index.js';
            pkg.types = 'dist/index.d.ts';
            pkg.exports = {
              '.': {
                'import': './dist/index.js',
                'types': './dist/index.d.ts'
              },
              './core': {
                'import': './dist/src/core/Kwami.js',
                'types': './dist/src/core/Kwami.d.ts'
              },
              './blob': {
                'import': './dist/src/blob/Blob.js',
                'types': './dist/src/blob/Blob.d.ts'
              },
              './utils': {
                'import': './dist/src/utils/randoms.js',
                'types': './dist/src/utils/randoms.d.ts'
              },
              './types': {
                'types': './dist/src/types/index.d.ts'
              }
            };
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));
          "

      - name: 🚀 Publish to npm with provenance
        run: npm publish --access public --provenance

      - name: 🏷️ Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.check-version.outputs.version }}" -m "🚀 Release v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Publish successful
        run: |
          echo "🎉 Successfully published kwami@${{ needs.check-version.outputs.version }} to npm!"
          echo "📦 View at: https://www.npmjs.com/package/kwami/v/${{ needs.check-version.outputs.version }}"

