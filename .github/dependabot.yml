# To learn more, see: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # -----------------------------------------------------------------------
  # 1. npm configuration (Handles your Node.js, TypeScript, and GLSL packages)
  # -----------------------------------------------------------------------
  - package-ecosystem: "npm"
    # Look for `package.json` and `package-lock.json` (or yarn/pnpm lock files) in the root
    directory: "/"
    
    # Check for updates every Monday at 9:00 AM UTC
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    
    # Assign PRs to a specific user (replace with actual GitHub handle)
    assignees:
      - "your-github-username"
    
    # Add labels to the Dependabot PRs for easy filtering
    labels:
      - "dependencies"
      - "npm"

    # Customize the commit message
    commit-message:
      prefix: "chore"
      include: "scope"

    # Limit the number of open Dependabot PRs at any one time
    open-pull-requests-limit: 10

    # Strategy for rebasing open PRs if there are conflicts
    rebase-strategy: "auto"

    # Keep version requirements updated in package.json
    versioning-strategy: "increase"

    # ---------------------------------------------------------------------
    # GROUPING: Consolidate PRs to avoid being spammed by Dependabot
    # ---------------------------------------------------------------------
    groups:
      # Group all TypeScript-related updates into a single PR
      typescript-ecosystem:
        patterns:
          - "typescript"
          - "@types/*"
          - "ts-node"
          - "tslib"
          
      # Group GLSL-related tools and loaders into a single PR
      glsl-tools:
        patterns:
          - "*glsl*"
          - "three" # (If you are using Three.js alongside GLSL)
          
      # Group all other minor and patch updates into a single PR
      # (Major updates will still get their own PRs to prevent breaking changes)
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    # ---------------------------------------------------------------------
    # IGNORE: Exclude specific packages or versions if necessary
    # ---------------------------------------------------------------------
    ignore:
      - dependency-name: "some-problematic-package"
        versions: ["> 2.0.0"] # Ignore updates beyond version 2.0.0

  # -----------------------------------------------------------------------
  # 2. GitHub Actions configuration (Recommended if you use GitHub Actions)
  # -----------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "actions"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5
    groups:
      # Group all GitHub action updates together
      actions:
        patterns:
          - "*"
