id: focus-session
name: Focus Session
description: Pomodoro-style focus mode with greeting and minimization
version: 1.0.0
author: Kwami Team
tags:
  - productivity
  - focus
  - pomodoro
trigger: manual
actions:
  - type: sequence
    actions:
      - type: mind.speak
        text: "Starting your focus session. I'll minimize myself to the corner so you can concentrate. Good luck!"
      - type: wait
        duration: 2000
      - type: sequence
        parallel: true
        actions:
          - type: body.scale
            preset: mini
            duration: 1000
            easing: ease-in-out
          - type: body.position
            preset: top-right
            duration: 1000
            easing: ease-in-out
          - type: body.colors
            primary: "#667eea"
            secondary: "#764ba2"
            accent: "#f093fb"
            duration: 1000

