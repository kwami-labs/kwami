<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kwami Playground</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Left Sidebar -->
    <div id="left-sidebar">
      <button class="swap-button" id="left-swap-btn" onclick="swapLeftSidebar()">
        <span id="left-swap-text">→ Soul</span>
      </button>
      <div id="left-content"></div>
      <div id="error" class="error"></div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container">
      <div id="background-image"></div>
      <canvas id="kwami-canvas"></canvas>
    </div>
    
    <!-- Right Sidebar -->
    <div id="right-sidebar">
      <button class="swap-button" id="right-swap-btn" onclick="swapRightSidebar()">
        <span id="right-swap-text">Soul ←</span>
      </button>
      <div id="right-content"></div>
      <div id="status"></div>
    </div>
  </div>

  <!-- Mind Section (AI Agent Configuration) -->
  <template id="mind-template">
    <div class="sidebar-content">
      <h1>🤖 Mind</h1>
      <p class="subtitle">AI Agent Configuration</p>
      
      <div class="state-indicator" id="state-indicator">
        <span id="state-text">IDLE</span>
      </div>

      <!-- Voice Settings -->
      <div class="section">
        <div class="section-title">🗣️ Voice Settings</div>
        
        <div class="input-group">
          <label>API Key</label>
          <input type="text" id="api-key" placeholder="Enter ElevenLabs API Key">
        </div>

        <div class="input-group">
          <label>Voice ID</label>
          <input type="text" id="voice-id" value="pNInz6obpgDQGcFmaJgB" placeholder="Voice ID">
        </div>

        <button onclick="initializeMind()" id="init-btn">Initialize AI Agent</button>
      </div>

      <!-- Speech Test -->
      <div class="section">
        <div class="section-title">💬 Test Speech</div>
        
        <div class="input-group">
          <label>Text to Speak</label>
          <textarea id="speak-text" placeholder="Enter text for Kwami to speak...">Hello! I am Kwami, your AI companion. Watch as I animate while I speak!</textarea>
        </div>

        <button onclick="speak()" id="speak-btn" disabled>🎤 Speak</button>
      </div>
    </div>
  </template>

  <!-- Body Section (Visual Configuration) -->
  <template id="body-template">
    <div class="sidebar-content">
      <h2>🎨 Body</h2>
      <p class="subtitle">Visual Configuration</p>

      <!-- Background -->
      <div class="section">
        <div class="section-title">🌈 Background</div>
        
        <div class="input-group">
          <label>Canvas Background</label>
          <select id="bg-type">
            <option value="gradient">Gradient</option>
            <option value="solid">Solid Color</option>
            <option value="transparent">Transparent</option>
          </select>
        </div>

        <div id="opacity-control">
          <div class="slider-control">
            <label>Opacity <span class="value-display" id="bg-opacity-value">1.0</span></label>
            <input type="range" id="bg-opacity" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

        <div class="input-group">
          <label>Background Image</label>
          <select id="bg-image">
            <option value="">None</option>
            <option value="black-hole.jpg">Black Hole</option>
            <option value="galaxy.jpg">Galaxy</option>
            <option value="galaxy2.jpg">Galaxy 2</option>
            <option value="gargantua.jpg">Gargantua</option>
            <option value="interstellar.png">Interstellar</option>
            <option value="skynet.png">Skynet</option>
            <option value="universe.jpg">Universe</option>
          </select>
        </div>

        <div id="gradient-controls">
          <div class="parameter-group">
            <div class="parameter-group-title">Gradient Colors</div>
            <div class="color-control">
              <label>Color 1</label>
              <input type="color" id="bg-color-1" value="#667eea">
            </div>
            <div class="color-control">
              <label>Color 2</label>
              <input type="color" id="bg-color-2" value="#764ba2">
            </div>
            <div class="color-control">
              <label>Color 3</label>
              <input type="color" id="bg-color-3" value="#f093fb">
            </div>
          </div>

          <div class="input-group">
            <label>Direction</label>
            <select id="bg-direction">
              <option value="vertical">Vertical</option>
              <option value="horizontal">Horizontal</option>
              <option value="radial">Radial</option>
            </select>
          </div>
        </div>

        <div id="solid-controls" style="display: none;">
          <div class="color-control">
            <label>Background Color</label>
            <input type="color" id="bg-solid-color" value="#667eea">
          </div>
        </div>

        <button class="button-secondary" onclick="randomizeBackground()">🎲 Randomize Background</button>
        <button class="button-secondary" onclick="randomizeBackgroundImage()">🖼️ Random Image</button>
      </div>

      <!-- Body Configuration -->
      <div class="section">
        <div class="section-title">🎨 Body</div>
        
        <!-- Spikes -->
        <div class="parameter-group">
          <div class="parameter-group-title">Spikes (Noise Frequency)</div>
          <div class="slider-control">
            <label>X <span class="value-display" id="spike-x-value">0.2</span></label>
            <input type="range" id="spike-x" min="0" max="20" step="0.1" value="0.2">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="spike-y-value">0.2</span></label>
            <input type="range" id="spike-y" min="0" max="20" step="0.1" value="0.2">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="spike-z-value">0.2</span></label>
            <input type="range" id="spike-z" min="0" max="20" step="0.1" value="0.2">
          </div>
        </div>

        <!-- Time/Speed -->
        <div class="parameter-group">
          <div class="parameter-group-title">Time (Animation Speed)</div>
          <div class="slider-control">
            <label>X <span class="value-display" id="time-x-value">1.0</span></label>
            <input type="range" id="time-x" min="0" max="5" step="0.1" value="1">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="time-y-value">1.0</span></label>
            <input type="range" id="time-y" min="0" max="5" step="0.1" value="1">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="time-z-value">1.0</span></label>
            <input type="range" id="time-z" min="0" max="5" step="0.1" value="1">
          </div>
        </div>

        <!-- Camera Position -->
        <div class="parameter-group">
          <div class="parameter-group-title">Camera Position</div>
          <div class="slider-control">
            <label>X <span class="value-display" id="camera-x-value">0</span></label>
            <input type="range" id="camera-x" min="-20" max="20" step="0.5" value="0">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="camera-y-value">0</span></label>
            <input type="range" id="camera-y" min="-20" max="20" step="0.5" value="0">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="camera-z-value">12</span></label>
            <input type="range" id="camera-z" min="1" max="30" step="0.5" value="12">
          </div>
        </div>

        <!-- Rotation Speed -->
        <div class="parameter-group">
          <div class="parameter-group-title">Auto Rotation Speed</div>
          <div class="slider-control">
            <label>X <span class="value-display" id="rotation-x-value">0.000</span></label>
            <input type="range" id="rotation-x" min="0" max="0.01" step="0.001" value="0">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="rotation-y-value">0.000</span></label>
            <input type="range" id="rotation-y" min="0" max="0.01" step="0.001" value="0">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="rotation-z-value">0.000</span></label>
            <input type="range" id="rotation-z" min="0" max="0.01" step="0.001" value="0">
          </div>
        </div>

        <!-- Colors -->
        <div class="parameter-group">
          <div class="parameter-group-title">Colors (Tricolor Skin)</div>
          <div class="color-control">
            <label>Color X</label>
            <input type="color" id="color-x" value="#ff0066">
          </div>
          <div class="color-control">
            <label>Color Y</label>
            <input type="color" id="color-y" value="#00ff66">
          </div>
          <div class="color-control">
            <label>Color Z</label>
            <input type="color" id="color-z" value="#6600ff">
          </div>
        </div>

        <!-- Appearance -->
        <div class="parameter-group">
          <div class="parameter-group-title">Appearance</div>
          <div class="slider-control">
            <label>Scale <span class="value-display" id="scale-value">4.0</span></label>
            <input type="range" id="scale" min="3" max="8" step="0.1" value="4.0">
          </div>
          <div class="slider-control">
            <label>Resolution <span class="value-display" id="resolution-value">180</span></label>
            <input type="range" id="resolution" min="120" max="220" step="1" value="180">
          </div>
          <div class="slider-control">
            <label>Shininess <span class="value-display" id="shininess-value">100</span></label>
            <input type="range" id="shininess" min="0" max="100000" step="100" value="100">
          </div>
          <div class="input-group">
            <label>
              <input type="checkbox" id="wireframe">
              Wireframe Mode
            </label>
          </div>
          <div class="input-group">
            <label>Skin Type</label>
            <select id="skin-type">
              <option value="tricolor">Tricolor</option>
              <option value="tricolor2">Tricolor2 (Donut)</option>
              <option value="zebra">Zebra</option>
            </select>
          </div>
        </div>

        <!-- Action Buttons -->
        <button class="button-secondary" onclick="randomizeBlob()">🎲 Randomize Blob</button>
        <button class="button-secondary" onclick="exportGLB()">💾 Download GLB</button>
      </div>
    </div>
  </template>

  <!-- Soul Section (Personality Configuration) -->
  <template id="soul-template">
    <div class="sidebar-content">
      <h2>✨ Soul</h2>
      <p class="subtitle">Personality Configuration</p>

      <div class="section">
        <div class="section-title">🎭 Personality</div>
        <p class="about-text">Define who Kwami is - their character, traits, and communication style.</p>
        
        <div class="input-group">
          <label>Name</label>
          <input type="text" id="soul-name" value="Kwami" placeholder="Kwami's name">
        </div>

        <div class="input-group">
          <label>Personality Description</label>
          <textarea id="soul-personality" placeholder="Describe Kwami's personality...">Friendly, helpful, and curious AI companion with a playful spirit.</textarea>
        </div>

        <div class="input-group">
          <label>System Prompt</label>
          <textarea id="soul-system-prompt" placeholder="Base instructions for AI behavior..." style="min-height: 120px;">You are Kwami, a friendly AI companion. You are helpful, curious, and enjoy engaging conversations. Keep responses natural and concise.</textarea>
        </div>

        <div class="input-group">
          <label>Response Length</label>
          <select id="soul-response-length">
            <option value="short">Short</option>
            <option value="medium" selected>Medium</option>
            <option value="long">Long</option>
          </select>
        </div>

        <div class="input-group">
          <label>Emotional Tone</label>
          <select id="soul-emotional-tone">
            <option value="neutral">Neutral</option>
            <option value="warm" selected>Warm</option>
            <option value="enthusiastic">Enthusiastic</option>
            <option value="calm">Calm</option>
          </select>
        </div>

        <button class="button-secondary" onclick="applySoulConfig()">✅ Apply Soul Config</button>
      </div>

      <div class="section">
        <div class="section-title">🎨 Preset Personalities</div>
        
        <div class="personality-buttons">
          <button class="button-secondary" onclick="loadPersonality('friendly')">😊 Kaya</button>
          <button class="button-secondary" onclick="loadPersonality('professional')">💼 Nexus</button>
          <button class="button-secondary" onclick="loadPersonality('playful')">✨ Spark</button>
        </div>

        <div class="input-group">
          <label>Current Name: <span id="personality-name">Kwami</span></label>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="main.js"></script>
</body>
</html>
