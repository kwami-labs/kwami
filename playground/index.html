<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kwami Playground</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Left Sidebar -->
    <div id="left-sidebar">
      <button class="swap-button" id="left-swap-btn" onclick="swapLeftSidebar()">
        <span id="left-swap-text">→ Soul</span>
      </button>
      <div id="left-content"></div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container">
      <!-- Menu Toggle Button -->
      <button id="menu-toggle-btn" class="menu-toggle-btn" onclick="toggleMenus()" title="Toggle Sidebars">
        <span id="menu-toggle-icon">☰</span>
      </button>
      
      <!-- GitHub Star Button -->
      <a id="github-star-btn" class="github-star-btn" href="https://github.com/alexcolls/kwami" target="_blank" title="Star on GitHub">
        <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path>
        </svg>
        <span>Star</span>
        <span id="star-count">...</span>
      </a>
      
      <button id="audio-toggle-btn" class="audio-toggle-btn" type="button" aria-controls="audio-player" aria-expanded="false" aria-pressed="false" title="Show audio player">
        <span class="audio-toggle-icon">🎧</span>
      </button>

      <!-- Audio Player -->
      <div id="audio-player" class="hidden">
        <button id="audio-close-btn" class="audio-close-btn" type="button" title="Close audio player">✕</button>
        <input type="file" id="audio-file" accept="audio/*" style="display: none;">
        <button id="upload-audio-btn" class="player-btn" title="Upload Audio">📁</button>
        <button id="play-pause-btn" class="player-btn" disabled title="Play/Pause">▶️</button>
        <div id="audio-info">
          <span id="audio-name">No audio loaded</span>
          <span id="audio-time">0:00 / 0:00</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="100" value="80" title="Volume">
        <span id="volume-icon">🔊</span>
      </div>

      <div id="background-media" data-active="none">
        <video id="background-media-video" autoplay muted loop playsinline></video>
      </div>
      <div id="background-gradient"></div>
      
      <div id="canvas-overlay"></div>
      <canvas id="kwami-canvas"></canvas>
      
      <!-- State Indicator (Below Blob) -->
      <!-- <div id="state-indicator" class="state-indicator">
        <span id="state-text">IDLE</span>
      </div> -->

      <!-- Messages Area (Below Blob) -->
      <div id="messages-container">
        <div id="status" class="message"></div>
        <div id="error" class="message error-message"></div>
      </div>

      <!-- Version Display (dynamically populated) -->
      <div id="version-display"></div>
      </div>

    <!-- Right Sidebar -->
    <div id="right-sidebar">
      <button class="swap-button" id="right-swap-btn" onclick="swapRightSidebar()">
        <span id="right-swap-text">Soul ←</span>
      </button>
      <div id="right-content"></div>
    </div>
  </div>

  <!-- Mind Section (AI Agent Configuration) -->
  <template id="mind-template">
    <div class="sidebar-content">
      <h1>🤖 Mind</h1>
      <p class="subtitle">AI Agent Configuration</p>

      <!-- 🤖 AGENT MANAGEMENT SECTION -->
      <!-- API Key (Required First) -->
      <div class="section">
        <div class="section-title">🔑 API Authentication</div>
        <p style="color: #ffa500; font-size: 14px; margin: 10px 0; font-weight: 500;">
          ⚠️ Enter your API key to unlock all agent features below
        </p>
        
        <div class="input-group">
          <label>ElevenLabs API Key (Required)</label>
          <input type="password" id="api-key-agent" placeholder="Enter your ElevenLabs API Key">
          <small style="display: block; color: #888; margin-top: 2px;">Get from elevenlabs.io/settings/api-keys</small>
        </div>
        
        <button onclick="initializeAgentManager()" id="init-agent-manager-btn">🚀 Initialize Agent Manager</button>
        <div id="agent-manager-status" style="margin-top: 10px; display: none;">
          <small style="color: #4CAF50;">✅ Agent Manager Ready</small>
        </div>
      </div>

      <!-- Agent Creation (Primary Feature) -->
      <div class="section disabled-section" id="agent-creation-section">
        <div class="section-title">✨ Create New Agent</div>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
          Create a conversational AI agent with custom personality and voice
        </p>
        
        <div class="input-group">
          <label>Agent Name</label>
          <input type="text" id="agent-name" placeholder="My AI Agent">
        </div>
        
        <div class="input-group">
          <label>System Prompt (Agent's Personality)</label>
          <textarea id="agent-prompt" placeholder="You are a helpful, friendly AI assistant..." style="min-height: 100px;"></textarea>
          <small style="display: block; color: #888; margin-top: 2px;">
            Define how the agent behaves and responds
          </small>
        </div>
        
        <div class="input-group">
          <label>First Message (Greeting)</label>
          <input type="text" id="agent-first-message" placeholder="Hello! How can I help you today?" value="Hello! How can I help you today?">
        </div>
        
        <div class="input-group">
          <label>Language Model (LLM)</label>
          <select id="agent-llm-model">
            <option value="gpt-4">GPT-4 (Recommended)</option>
            <option value="gpt-4-turbo">GPT-4 Turbo (Faster)</option>
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo (Economical)</option>
            <option value="claude-3-opus">Claude 3 Opus</option>
            <option value="claude-3-sonnet">Claude 3 Sonnet</option>
            <option value="claude-3-haiku">Claude 3 Haiku (Fast)</option>
          </select>
        </div>
        
        <div class="input-group">
          <label>Temperature <span class="value-display" id="agent-temperature-value">0.7</span></label>
          <input type="range" id="agent-temperature" min="0" max="1" step="0.1" value="0.7">
          <small style="display: block; color: #888; margin-top: 2px;">
            Lower = More focused | Higher = More creative
          </small>
        </div>
        
        <div class="input-group">
          <label>Max Response Tokens</label>
          <input type="number" id="agent-max-tokens" min="50" max="2000" value="500" placeholder="500">
        </div>
        
        <!-- Voice Configuration for Agent -->
        <div class="parameter-group">
          <div class="parameter-group-title">🎙️ Voice Configuration</div>
          
          <div class="input-group">
            <label>Voice Selection</label>
            <select id="agent-voice-id">
              <option value="pNInz6obpgDQGcFmaJgB">Adam (Deep, Professional)</option>
              <option value="EXAVITQu4vr4xnSDxMaL">Bella (Soft, Female)</option>
              <option value="ErXwobaYiN019PkySvjV">Antoni (Well-rounded, Male)</option>
              <option value="MF3mGyEYCl7XYWbV9V6O">Elli (Emotional, Female)</option>
              <option value="TxGEqnHWrfWFTfGW9XjX">Josh (Young, Male)</option>
            </select>
          </div>
          
          <div class="input-group">
            <label>TTS Model</label>
            <select id="agent-tts-model">
              <option value="eleven_turbo_v2" selected>Eleven Turbo v2 (Recommended)</option>
              <option value="eleven_turbo_v2_5">Eleven Turbo v2.5</option>
              <option value="eleven_multilingual_v2">Eleven Multilingual v2</option>
            </select>
          </div>
          
          <div class="slider-control">
            <label>Voice Stability <span class="value-display" id="agent-stability-value">0.5</span></label>
            <input type="range" id="agent-stability" min="0" max="1" step="0.05" value="0.5">
          </div>
          
          <div class="slider-control">
            <label>Similarity Boost <span class="value-display" id="agent-similarity-value">0.75</span></label>
            <input type="range" id="agent-similarity" min="0" max="1" step="0.05" value="0.75">
          </div>
        </div>
        
        <button onclick="createNewAgent()" id="create-agent-btn" disabled>✨ Create Agent</button>
        <div id="agent-creation-status" style="margin-top: 10px; display: none;"></div>
      </div>

      <!-- My Agents List -->
      <div class="section disabled-section" id="agents-list-section">
        <div class="section-title">📋 My Agents</div>
        <button class="button-secondary" onclick="refreshAgentsList()" id="refresh-agents-btn" disabled style="margin-bottom: 10px;">🔄 Refresh List</button>
        
        <div id="agents-list-container">
          <div id="agents-list" class="agents-list">
            <!-- Agents will be populated here -->
          </div>
          <div id="agents-list-empty" style="color: #888; padding: 20px; text-align: center; display: none;">
            No agents found. Create your first agent above! 👆
          </div>
        </div>
      </div>

      <!-- Selected Agent Actions -->
      <div class="section disabled-section" id="agent-actions-section">
        <div class="section-title">🎯 Active Agent</div>
        
        <div id="selected-agent-info" style="padding: 15px; background: #1a1a1a; border-radius: 12px; margin-bottom: 15px;">
          <div style="font-weight: bold; margin-bottom: 5px;">
            <span id="selected-agent-name">No agent selected</span>
          </div>
          <div style="font-size: 12px; color: #888;">
            <span id="selected-agent-id"></span>
          </div>
        </div>
        
        <button onclick="startConversationWithAgent()" id="start-agent-conversation-btn" disabled>
          🎙️ Start Conversation
        </button>
        <button onclick="stopConversation()" id="stop-agent-conversation-btn" disabled style="display: none;">
          ⏹️ Stop Conversation
        </button>
      </div>

      <!-- Agent Testing -->
      <div class="section disabled-section" id="agent-testing-section">
        <div class="section-title">🧪 Test Agent</div>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
          Test your agent with simulated conversations before going live
        </p>
        
        <div class="input-group">
          <label>Test Message</label>
          <textarea id="test-message" placeholder="What can you help me with?">Hello! Tell me about yourself.</textarea>
        </div>
        
        <button onclick="testAgent()" id="test-agent-btn" disabled>🧪 Test Agent</button>
        
        <div id="test-results" style="margin-top: 15px; display: none;">
          <div style="padding: 15px; background: #1a1a1a; border-radius: 12px;">
            <div style="font-weight: bold; margin-bottom: 10px;">Test Results:</div>
            <div id="test-agent-response" style="color: #4CAF50; margin-bottom: 10px;"></div>
            <div id="test-agent-metadata" style="font-size: 12px; color: #888;"></div>
          </div>
        </div>
      </div>

      <!-- Cost Calculator -->
      <div class="section disabled-section" id="cost-calculator-section">
        <div class="section-title">💰 Cost Calculator</div>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
          Estimate token usage and costs for your agent
        </p>
        
        <div class="input-group">
          <label>Expected Conversation Turns</label>
          <input type="number" id="cost-calc-turns" min="1" max="1000" value="10" placeholder="10">
          <small style="display: block; color: #888; margin-top: 2px;">
            Number of back-and-forth exchanges
          </small>
        </div>
        
        <div class="input-group">
          <label>Average Message Length (characters)</label>
          <input type="number" id="cost-calc-length" min="10" max="500" value="50" placeholder="50">
        </div>
        
        <button onclick="calculateAgentCost()" id="calculate-cost-btn" disabled>💰 Calculate Cost</button>
        
        <div id="cost-results" style="margin-top: 15px; display: none;">
          <div style="padding: 15px; background: #1a1a1a; border-radius: 12px;">
            <div style="font-weight: bold; margin-bottom: 10px;">Estimated Costs:</div>
            <div style="color: #888; font-size: 14px;">
              <div>Prompt Tokens: <span id="cost-prompt-tokens">-</span></div>
              <div>Completion Tokens: <span id="cost-completion-tokens">-</span></div>
              <div>Total Tokens: <span id="cost-total-tokens">-</span></div>
              <div style="margin-top: 10px; font-size: 16px; color: #4CAF50;">
                Cost per Conversation: <span id="cost-per-conversation">$-</span>
              </div>
              <div>Model: <span id="cost-model">-</span></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Agent Link -->
      <div class="section disabled-section" id="agent-link-section">
        <div class="section-title">🔗 Share Agent</div>
        
        <button onclick="getAgentShareLink()" id="get-link-btn" disabled>🔗 Get Shareable Link</button>
        
        <div id="agent-link-result" style="margin-top: 15px; display: none;">
          <div style="padding: 15px; background: #1a1a1a; border-radius: 12px;">
            <div style="font-weight: bold; margin-bottom: 10px;">Shareable Link:</div>
            <div style="display: flex; gap: 10px; align-items: center;">
              <input type="text" id="agent-link-url" readonly style="flex: 1; background: #0a0a0a; padding: 8px; border-radius: 6px; border: 1px solid #333;">
              <button onclick="copyAgentLink()" class="button-secondary">📋 Copy</button>
            </div>
            <small style="display: block; color: #888; margin-top: 8px;">
              Link Status: <span id="agent-link-status">-</span>
            </small>
          </div>
        </div>
      </div>

      <!-- VOICE TESTING & PREVIEW TOOLS -->
      <div class="divider-section" style="margin: 40px 0; text-align: center; position: relative;">
        <hr style="border: none; border-top: 1px solid #333;">
        <span style="position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: #0a0a0a; padding: 0 15px; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">Voice Testing Tools</span>
      </div>
      
      <div class="info-box" style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%); border: 1px solid rgba(102, 126, 234, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 20px;">
        <p style="color: #aaa; font-size: 14px; margin: 0; line-height: 1.6;">
          💡 <strong>Pro Tip:</strong> Use the tools below to test and fine-tune voices before creating agents. Once you find the perfect settings, click "🔗 Copy to Agent Creation" to transfer them automatically.
        </p>
      </div>
      
      <!-- Legacy Authentication (Hidden - using new agent auth) -->
      <div class="section" style="display: none;">
        <div class="section-title">🧠 Mind (AI Configuration) - Legacy</div>
        
        <div class="input-group">
          <label>ElevenLabs API Key (Required)</label>
          <input type="password" id="api-key" placeholder="Enter your ElevenLabs API Key">
          <small style="display: block; color: #888; margin-top: 2px;">Get from elevenlabs.io/settings/api-keys</small>
        </div>
        
        <div class="input-group">
          <label>Agent ID (Required for Conversations)</label>
          <input type="text" id="agent-id" placeholder="Enter your ElevenLabs Agent ID">
          <small style="display: block; color: #888; margin-top: 2px;">Create at elevenlabs.io/app/conversational-ai</small>
        </div>

        <button onclick="initializeMind()" id="init-btn">Initialize AI Agent</button>
      </div>

      <!-- Voice Preview & Testing (Use before creating agents) -->
      <div class="section disabled-section" id="voice-preview-section">
        <div class="section-title">🎙️ Voice Preview & Testing</div>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
          Test voices and settings before adding them to your agents
        </p>
        
        <div class="input-group">
          <label>Voice Selection</label>
          <select id="voice-id">
            <option value="pNInz6obpgDQGcFmaJgB">Adam (Deep, Professional)</option>
            <option value="EXAVITQu4vr4xnSDxMaL">Bella (Soft, Female)</option>
            <option value="ErXwobaYiN019PkySvjV">Antoni (Well-rounded, Male)</option>
            <option value="MF3mGyEYCl7XYWbV9V6O">Elli (Emotional, Female)</option>
            <option value="TxGEqnHWrfWFTfGW9XjX">Josh (Young, Male)</option>
            <option value="VR6AewLTigWG4xSOukaG">Arnold (Crisp, Male)</option>
            <option value="pqHfZKP75CvOlQylNhV4">Bill (Strong, Male)</option>
            <option value="nPczCjzI2devNBz1zQrb">Brian (Deep, Authoritative)</option>
            <option value="N2lVS1w4EtoT3dr4eOWO">Callum (Hoarse, Male)</option>
            <option value="IKne3meq5aSn9XLyUdCD">Charlie (Casual, Male)</option>
            <option value="XB0fDUnXU5powFXDhCwa">Charlotte (Seductive, Female)</option>
            <option value="iP95p4xoKVk53GoZ742B">Chris (Casual, American)</option>
            <option value="onwK4e9ZLuTAKqWW03F9">Daniel (Deep, Authoritative)</option>
            <option value="cjVigY5qzO86Huf0OWal">Eric (Friendly, Male)</option>
            <option value="JBFqnCBsd6RMkjVDRZzb">George (Warm, British)</option>
            <option value="cgSgspJ2msm6clMCkdW9">Jessica (Expressive, Female)</option>
            <option value="FGY2WhTYpPnrIDTdsKH5">Laura (Upbeat, Female)</option>
            <option value="jBpfuIE2acCO8z3wKNLl">Lily (Raspy, Female)</option>
            <option value="t0jbNlBVZ17f02VDIeMI">Matilda (Warm, Female)</option>
            <option value="custom">Custom Voice ID...</option>
          </select>
        </div>

        <div class="input-group">
          <label>Model</label>
          <select id="voice-model">
            <option value="eleven_multilingual_v2" selected>Eleven Multilingual v2 (Recommended)</option>
            <option value="eleven_turbo_v2">Eleven Turbo v2 (Fastest)</option>
            <option value="eleven_turbo_v2_5">Eleven Turbo v2.5 (Balanced)</option>
            <option value="eleven_monolingual_v1">Eleven Monolingual v1 (English Only)</option>
            <option value="eleven_multilingual_v1">Eleven Multilingual v1 (Legacy)</option>
          </select>
        </div>

        <div class="input-group" id="custom-voice-container" style="display: none;">
          <label>Custom Voice ID</label>
          <input type="text" id="custom-voice-id" placeholder="Enter custom voice ID">
        </div>

        <button class="button-secondary" onclick="loadAvailableVoices()">📋 Load My Voices</button>
        <div id="available-voices-list" style="display: none; margin-top: 10px;">
          <select id="user-voices" size="5" style="width: 100%;">
            <!-- Dynamically populated -->
          </select>
          <button class="button-secondary" onclick="selectUserVoice()" style="margin-top: 5px;">Use Selected Voice</button>
        </div>

        <div class="input-group">
          <label>Language</label>
          <select id="voice-language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="pl">Polish</option>
            <option value="nl">Dutch</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="ru">Russian</option>
            <option value="tr">Turkish</option>
          </select>
        </div>
      </div>

      <button onclick="previewVoice()" id="preview-btn" disabled class="button-secondary">👂 Preview Voice</button>
      <button onclick="copyTestedSettingsToAgent()" class="button-secondary" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">🔗 Use in Agent Creation</button>

      <!-- Voice Settings (Fine-tuning for Testing) -->
      <div class="section disabled-section" id="voice-settings-section">
        <div class="section-title">🎚️ Voice Fine-Tuning Lab</div>
        
        <div class="parameter-group">
          <div class="parameter-group-title">Voice Characteristics</div>
          <p class="parameter-info">Fine-tune how the voice sounds</p>
          
          <div class="slider-control">
            <label>Stability <span class="value-display" id="voice-stability-value">0.50</span></label>
            <input type="range" id="voice-stability" min="0" max="1" step="0.05" value="0.5">
            <small style="display: block; color: #888; margin-top: 2px;">Low: More expressive | High: More consistent</small>
          </div>
          
          <div class="slider-control">
            <label>Similarity Boost <span class="value-display" id="voice-similarity-value">0.75</span></label>
            <input type="range" id="voice-similarity" min="0" max="1" step="0.05" value="0.75">
            <small style="display: block; color: #888; margin-top: 2px;">Higher values enhance voice clarity</small>
          </div>
          
          <div class="slider-control">
            <label>Style <span class="value-display" id="voice-style-value">0.00</span></label>
            <input type="range" id="voice-style" min="0" max="1" step="0.05" value="0">
            <small style="display: block; color: #888; margin-top: 2px;">Adds expressiveness (use with caution)</small>
          </div>
          
          <div class="input-group">
            <label>
              <input type="checkbox" id="voice-speaker-boost" checked>
              Speaker Boost (Enhanced clarity)
            </label>
          </div>
        </div>

        <button class="button-secondary" onclick="applyVoiceSettings()">✅ Apply Voice Settings</button>
        <button class="button-secondary" onclick="copyTestedSettingsToAgent()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin-top: 10px;">🔗 Copy to Agent Creation</button>
      </div>

      <!-- Advanced TTS Options (Testing) -->
      <div class="section disabled-section" id="tts-options-section">
        <div class="section-title">⚙️ Advanced TTS Testing</div>
        
        <div class="input-group">
          <label>Output Format</label>
          <select id="tts-output-format">
            <option value="mp3_44100_128" selected>MP3 - 44.1kHz, 128kbps (Recommended)</option>
            <option value="mp3_44100_64">MP3 - 44.1kHz, 64kbps (Smaller size)</option>
            <option value="mp3_44100_192">MP3 - 44.1kHz, 192kbps (High quality)</option>
            <option value="pcm_16000">PCM - 16kHz (Low latency)</option>
            <option value="pcm_22050">PCM - 22.05kHz (Balanced)</option>
            <option value="pcm_24000">PCM - 24kHz (Good quality)</option>
            <option value="pcm_44100">PCM - 44.1kHz (CD quality)</option>
          </select>
        </div>

        <div class="input-group">
          <label>
            <input type="checkbox" id="tts-optimize-latency">
            Optimize Streaming Latency
          </label>
          <small style="display: block; color: #888; margin-top: 2px;">Reduces delay for real-time applications</small>
        </div>

        <div class="slider-control">
          <label>Next Text Timeout <span class="value-display" id="tts-next-text-value">1000</span>ms</label>
          <input type="range" id="tts-next-text" min="100" max="5000" step="100" value="1000">
          <small style="display: block; color: #888; margin-top: 2px;">Wait time before processing next chunk</small>
        </div>
      </div>

      <!-- Direct Conversation (Legacy - Use Agent Management Instead) -->
      <div class="section disabled-section" id="direct-conversation-section">
        <div class="section-title">💬 Direct Conversation (Legacy)</div>
        <p style="color: #ffa500; font-size: 14px; margin-bottom: 15px;">
          ⚠️ Recommended: Use Agent Management above for full conversation features
        </p>
        
        <!-- Conversation status container -->

          </div>
          <div class="slider-control">
            <label>High Detail <span class="value-display" id="audio-high-spike-value">0.38</span></label>
            <input type="range" id="audio-high-spike" min="0" max="1" step="0.05" value="0.38">
          </div>
          <div class="slider-control">
            <label>Audio Reactivity <span class="value-display" id="audio-reactivity-value">1.90</span></label>
            <input type="range" id="audio-reactivity" min="0.5" max="3" step="0.05" value="1.90">
          </div>
          <div class="slider-control">
            <label>Sensitivity Threshold <span class="value-display" id="audio-sensitivity-value">0.08</span></label>
            <input type="range" id="audio-sensitivity" min="0.01" max="0.3" step="0.005" value="0.08">
          </div>
          <div class="slider-control">
            <label>Breathing (Idle) <span class="value-display" id="audio-breathing-value">0.04</span></label>
            <input type="range" id="audio-breathing" min="0" max="0.1" step="0.005" value="0.04">
          </div>
        </div>

        <!-- Time Modulation -->
        <div class="parameter-group">
          <div class="parameter-group-title">Time Modulation</div>
          <p class="parameter-info">Control how audio affects animation speed</p>
          <div class="input-group">
            <label>
              <input type="checkbox" id="audio-time-enabled">
              Enable Time Modulation (Can be chaotic)
            </label>
          </div>
          <div class="slider-control">
            <label>Mid → Speed <span class="value-display" id="audio-mid-time-value">0.10</span></label>
            <input type="range" id="audio-mid-time" min="0" max="2" step="0.05" value="0.10">
          </div>
          <div class="slider-control">
            <label>High → Speed <span class="value-display" id="audio-high-time-value">0.18</span></label>
            <input type="range" id="audio-high-time" min="0" max="2" step="0.05" value="0.18">
          </div>
          <div class="slider-control">
            <label>Ultra → Speed <span class="value-display" id="audio-ultra-time-value">0.08</span></label>
            <input type="range" id="audio-ultra-time" min="0" max="2" step="0.05" value="0.08">
          </div>
        </div>

        <!-- Audio Analyzer Settings -->
        <div class="parameter-group">
          <div class="parameter-group-title">Audio Analyzer</div>
          <div class="slider-control">
            <label>FFT Size <span class="value-display" id="fft-size-value">2048</span></label>
            <select id="fft-size">
              <option value="512">512 (Fast, Low Res)</option>
              <option value="1024">1024 (Balanced)</option>
              <option value="2048" selected>2048 (Default)</option>
              <option value="4096">4096 (High Res)</option>
            </select>
          </div>
          <div class="slider-control">
            <label>Smoothing <span class="value-display" id="smoothing-value">0.35</span></label>
            <input type="range" id="smoothing" min="0" max="1" step="0.05" value="0.35">
          </div>
        </div>

        <!-- Audio Reactive Toggle -->
        <div class="input-group">
          <label>
            <input type="checkbox" id="audio-reactive" checked>
            Enable Audio Reactivity
          </label>
        </div>
      </div>

      <!-- Interaction Configuration -->
      <div class="section">
        <div class="section-title">👆 Interaction</div>
        
        <!-- Touch/Click Effects -->
        <div class="parameter-group">
          <div class="parameter-group-title">Touch/Click Effects</div>
          <div class="input-group">
            <label>
              <input type="checkbox" id="click-interaction" checked>
              Enable Click Interaction
            </label>
          </div>
          <div class="slider-control">
            <label>Touch Strength <span class="value-display" id="touch-strength-value">1.0</span></label>
            <input type="range" id="touch-strength" min="0.1" max="2" step="0.1" value="1.0">
          </div>
          <div class="slider-control">
            <label>Touch Duration <span class="value-display" id="touch-duration-value">1100</span>ms</label>
            <input type="range" id="touch-duration" min="500" max="3000" step="100" value="1100">
          </div>
          <div class="slider-control">
            <label>Max Touch Points <span class="value-display" id="max-touches-value">5</span></label>
            <input type="range" id="max-touches" min="1" max="10" step="1" value="5">
          </div>
        </div>

        <!-- State Transitions -->
        <div class="parameter-group">
          <div class="parameter-group-title">State Transitions</div>
          <div class="slider-control">
            <label>Transition Speed <span class="value-display" id="transition-speed-value">0.05</span></label>
            <input type="range" id="transition-speed" min="0.01" max="0.2" step="0.01" value="0.05">
          </div>
          <div class="slider-control">
            <label>Thinking Duration <span class="value-display" id="thinking-duration-value">10</span>s</label>
            <input type="range" id="thinking-duration" min="3" max="30" step="1" value="10">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="section">
        <div class="section-title">⚡ Actions</div>
        <button class="button-secondary" onclick="randomizeBlob()">🎲 Randomize Blob</button>
        <button class="button-secondary" onclick="exportGLB()">💾 Download GLB</button>
        <button class="button-secondary" onclick="testThinking()">🤔 Test Thinking Mode</button>
        <button class="button-secondary" onclick="testListening()">👂 Test Listening Mode</button>
      </div>
    </div>
  </template>

  <!-- Soul Section (Personality Configuration) -->
  <template id="soul-template">
    <div class="sidebar-content">
      <h2>✨ Soul</h2>
      <p class="subtitle">Personality Configuration</p>

      <div class="section">
        <div class="section-title">🎭 Personality</div>
        <p class="about-text">Define who Kwami is - their character, traits, and communication style.</p>
        
        <div class="input-group">
          <label>Name</label>
          <input type="text" id="soul-name" value="Kwami" placeholder="Kwami's name">
        </div>

        <div class="input-group">
          <label>Personality Description</label>
          <textarea id="soul-personality" placeholder="Describe Kwami's personality...">Friendly, helpful, and curious AI companion with a playful spirit.</textarea>
        </div>

        <div class="input-group">
          <label>System Prompt</label>
          <textarea id="soul-system-prompt" placeholder="Base instructions for AI behavior..." style="min-height: 120px;">You are Kwami, a friendly AI companion. You are helpful, curious, and enjoy engaging conversations. Keep responses natural and concise.</textarea>
        </div>

        <div class="input-group">
          <label>Response Length</label>
          <select id="soul-response-length">
            <option value="short">Short</option>
            <option value="medium" selected>Medium</option>
            <option value="long">Long</option>
          </select>
        </div>

        <div class="input-group">
          <label>Emotional Tone</label>
          <select id="soul-emotional-tone">
            <option value="neutral">Neutral</option>
            <option value="warm" selected>Warm</option>
            <option value="enthusiastic">Enthusiastic</option>
            <option value="calm">Calm</option>
          </select>
        </div>

        <button class="button-secondary" onclick="applySoulConfig()">✅ Apply Soul Config</button>
      </div>

      <div class="section">
        <div class="section-title">🎨 Preset Personalities</div>
        
        <div class="personality-buttons">
          <button class="button-secondary" onclick="loadPersonality('friendly')">😊 Kaya</button>
          <button class="button-secondary" onclick="loadPersonality('professional')">💼 Nexus</button>
          <button class="button-secondary" onclick="loadPersonality('playful')">✨ Spark</button>
  </div>

        <div class="input-group">
          <label>Current Name: <span id="personality-name">Kwami</span></label>
        </div>
      </div>
    </div>
  </template>

  <script src="agent-management-functions.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
