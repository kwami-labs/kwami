<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kwami Playground</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👻</text></svg>">
</head>
<body>
  <div id="app">
    <!-- Left Sidebar -->
    <div id="left-sidebar">
      <button class="swap-button" id="left-swap-btn" onclick="swapLeftSidebar()">
        <span id="left-swap-text">Soul</span>
      </button>
      <div id="left-content"></div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container">
      <!-- Menu Toggle Button -->
      <button id="menu-toggle-btn" class="menu-toggle-btn" onclick="toggleMenus()" title="Toggle Sidebars">
        <span id="menu-toggle-icon">☰</span>
      </button>
      
      <!-- Theme Toggle Button -->
      <button id="theme-toggle-btn" class="theme-toggle-btn" type="button" title="Toggle Theme">
        <span id="theme-toggle-icon">🌙</span>
      </button>
      
      <!-- GitHub Star Button -->
      <a id="github-star-btn" class="github-star-btn" href="https://github.com/alexcolls/kwami" target="_blank" title="Star on GitHub">
        <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path>
        </svg>
        <span>Star</span>
        <span id="star-count">...</span>
      </a>
      
      <button id="audio-toggle-btn" class="audio-toggle-btn" type="button" aria-controls="audio-player" aria-expanded="false" aria-pressed="false" title="Show audio player">
        <span class="audio-toggle-icon">🎧</span>
      </button>

      <!-- Audio Player -->
      <div id="audio-player" class="hidden">
        <button id="audio-close-btn" class="audio-close-btn" type="button" title="Close audio player">✕</button>
        <input type="file" id="audio-file" accept="audio/*" style="display: none;">
        <button id="upload-audio-btn" class="player-btn" title="Upload Audio">📁</button>
        <button id="play-pause-btn" class="player-btn" disabled title="Play/Pause">▶️</button>
        <div id="audio-info">
          <span id="audio-name">No audio loaded</span>
          <span id="audio-time">0:00 / 0:00</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="100" value="80" title="Volume">
        <span id="volume-icon">🔊</span>
      </div>

      <div id="background-media" data-active="none">
        <video id="background-media-video" autoplay muted loop playsinline></video>
      </div>
      <div id="background-gradient"></div>
      
      <div id="canvas-overlay"></div>
      <canvas id="kwami-canvas"></canvas>
      
      <!-- State Indicator (Below Blob) -->
      <!-- <div id="state-indicator" class="state-indicator">
        <span id="state-text">IDLE</span>
      </div> -->

      <!-- Messages Area (Below Blob) -->
      <div id="messages-container">
        <div id="status" class="message"></div>
        <div id="error" class="message error-message"></div>
      </div>

      <!-- Version Display (dynamically populated) -->
      <div id="version-display"></div>
      </div>

    <!-- Right Sidebar -->
    <div id="right-sidebar">
      <button class="swap-button" id="right-swap-btn" onclick="swapRightSidebar()">
        <span id="right-swap-text">Soul</span>
      </button>
      <div id="right-content"></div>
    </div>
  </div>

  <!-- Mind Section (AI Agent Configuration) -->
  <template id="mind-template">
    <div class="sidebar-content">
      <h2>🧠 Mind</h2>
      <p class="subtitle">Conversational AI Agents</p>

      <!-- Provider Tabs -->
      <div class="section">
        <div class="provider-tabs" id="provider-tabs">
          <button class="provider-tab active" data-provider="elevenlabs" onclick="switchProvider('elevenlabs')">
            <span class="provider-icon">
              <img src="logo/elevenlabs.webp" alt="ElevenLabs" class="provider-logo">
            </span>
            <span class="provider-name">11labs</span>
          </button>
          <button class="provider-tab" data-provider="openai" onclick="switchProvider('openai')" disabled title="Coming Soon">
            <span class="provider-icon">
              <img src="logo/openai.webp" alt="OpenAI" class="provider-logo">
            </span>
            <span class="provider-name">OpenAI</span>
          </button>
        </div>
      </div>

      <!-- ElevenLabs Provider Content -->
      <div id="provider-elevenlabs" class="provider-content active">
        <!-- API Key (Required First) -->
        <div class="section">
          <div class="section-title">🔑 API Authentication</div>
          <p style="color: #ffa500; font-size: 14px; margin: 10px 0; font-weight: 500;">
            ⚠️ Enter your API key to unlock all agent features below
          </p>
          
          <div class="input-group">
            <label>ElevenLabs API Key (Required)</label>
            <input type="password" id="api-key-agent" placeholder="Enter your ElevenLabs API Key">
            <small style="display: block; color: #888; margin-top: 5px;">Get it from <a href="https://elevenlabs.io/app/agents/settings" target="_blank" rel="noopener noreferrer" style="color: #667eea; text-decoration: none;">elevenlabs.io/app/agents/settings</a></small>
          </div>
          
          <button onclick="initializeAgentManager()" id="init-agent-manager-btn">🚀 Initialize Agent Manager</button>
          <div id="agent-manager-status" style="margin-top: 10px; display: none;">
            <small style="color: #4CAF50;">✅ Agent Manager Ready</small>
          </div>
        </div>

      <!-- Agent Creation (Primary Feature) -->
      <div class="section disabled-section" id="agent-creation-section">
        <div class="section-title">✨ Create New Agent</div>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
          Create a conversational AI agent with custom personality and voice
        </p>
        
        <div class="input-group">
          <label>Agent Name</label>
          <input type="text" id="agent-name" placeholder="My AI Agent">
        </div>
        
        <div class="input-group">
          <label>System Prompt (Agent's Personality)</label>
          <textarea id="agent-prompt" placeholder="You are a helpful, friendly AI assistant..." style="min-height: 100px;"></textarea>
          <small style="display: block; color: #888; margin-top: 2px;">
            Define how the agent behaves and responds
          </small>
        </div>
        
        <div class="input-group">
          <label>First Message (Greeting)</label>
          <input type="text" id="agent-first-message" placeholder="Hello! How can I help you today?" value="Hello! How can I help you today?">
        </div>
        
        <div class="input-group">
          <label>Language Model (LLM)</label>
          <select id="agent-llm-model">
            <option value="gpt-4">GPT-4 (Recommended)</option>
            <option value="gpt-4-turbo">GPT-4 Turbo (Faster)</option>
            <option value="gpt-3.5-turbo">GPT-3.5 Turbo (Economical)</option>
            <option value="claude-3-opus">Claude 3 Opus</option>
            <option value="claude-3-sonnet">Claude 3 Sonnet</option>
            <option value="claude-3-haiku">Claude 3 Haiku (Fast)</option>
          </select>
        </div>
        
        <div class="input-group">
          <label>Temperature <span class="value-display" id="agent-temperature-value">0.7</span></label>
          <input type="range" id="agent-temperature" min="0" max="1" step="0.1" value="0.7">
          <small style="display: block; color: #888; margin-top: 2px;">
            Lower = More focused | Higher = More creative
          </small>
        </div>
        
        <div class="input-group">
          <label>Max Response Tokens</label>
          <input type="number" id="agent-max-tokens" min="50" max="2000" value="500" placeholder="500">
        </div>
        
        <!-- Voice Configuration for Agent -->
        <div class="parameter-group">
          <div class="parameter-group-title">🎙️ Voice Configuration</div>
          
          <div class="input-group">
            <label>Voice Selection</label>
            <select id="agent-voice-id">
              <option value="pNInz6obpgDQGcFmaJgB">Adam (Deep, Professional)</option>
              <option value="EXAVITQu4vr4xnSDxMaL">Bella (Soft, Female)</option>
              <option value="ErXwobaYiN019PkySvjV">Antoni (Well-rounded, Male)</option>
              <option value="MF3mGyEYCl7XYWbV9V6O">Elli (Emotional, Female)</option>
              <option value="TxGEqnHWrfWFTfGW9XjX">Josh (Young, Male)</option>
            </select>
          </div>
          
          <div class="input-group">
            <label>TTS Model</label>
            <select id="agent-tts-model">
              <option value="eleven_turbo_v2" selected>Eleven Turbo v2 (Recommended)</option>
              <option value="eleven_turbo_v2_5">Eleven Turbo v2.5</option>
              <option value="eleven_multilingual_v2">Eleven Multilingual v2</option>
            </select>
          </div>
          
          <div class="slider-control">
            <label>Voice Stability <span class="value-display" id="agent-stability-value">0.5</span></label>
            <input type="range" id="agent-stability" min="0" max="1" step="0.05" value="0.5">
          </div>
          
          <div class="slider-control">
            <label>Similarity Boost <span class="value-display" id="agent-similarity-value">0.75</span></label>
            <input type="range" id="agent-similarity" min="0" max="1" step="0.05" value="0.75">
          </div>
        </div>
        
        <button onclick="createNewAgent()" id="create-agent-btn" disabled>✨ Create Agent</button>
        <div id="agent-creation-status" style="margin-top: 10px; display: none;"></div>
      </div>

      <!-- My Agents List -->
      <div class="section disabled-section" id="agents-list-section">
        <div class="section-title">📋 My Agents</div>
        <button class="button-secondary" onclick="refreshAgentsList()" id="refresh-agents-btn" disabled style="margin-bottom: 10px;">🔄 Refresh List</button>
        
        <div id="agents-list-container">
          <div id="agents-list" class="agents-list">
            <!-- Agents will be populated here -->
          </div>
          <div id="agents-list-empty" style="color: #888; padding: 20px; text-align: center; display: none;">
            No agents found. Create your first agent above! 👆
          </div>
        </div>
      </div>

      <!-- Selected Agent Actions -->
      <div class="section disabled-section" id="agent-actions-section">
        <div class="section-title">🎯 Active Agent</div>
        
        <div id="selected-agent-info" style="padding: 15px; background: #1a1a1a; border-radius: 12px; margin-bottom: 15px;">
          <div style="font-weight: bold; margin-bottom: 5px;">
            <span id="selected-agent-name">No agent selected</span>
          </div>
          <div style="font-size: 12px; color: #888;">
            <span id="selected-agent-id"></span>
          </div>
        </div>
        
        <button onclick="startConversationWithAgent()" id="start-agent-conversation-btn" disabled>
          🎙️ Start Conversation
        </button>
        <button onclick="stopConversation()" id="stop-agent-conversation-btn" disabled style="display: none;">
          ⏹️ Stop Conversation
        </button>
      </div>

      <!-- Agent Testing -->
      <div class="section disabled-section" id="agent-testing-section">
        <div class="section-title">🧪 Test Agent</div>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
          Test your agent with simulated conversations before going live
        </p>
        
        <div class="input-group">
          <label>Test Message</label>
          <textarea id="test-message" placeholder="What can you help me with?">Hello! Tell me about yourself.</textarea>
        </div>
        
        <button onclick="testAgent()" id="test-agent-btn" disabled>🧪 Test Agent</button>
        
        <div id="test-results" style="margin-top: 15px; display: none;">
          <div style="padding: 15px; background: #1a1a1a; border-radius: 12px;">
            <div style="font-weight: bold; margin-bottom: 10px;">Test Results:</div>
            <div id="test-agent-response" style="color: #4CAF50; margin-bottom: 10px;"></div>
            <div id="test-agent-metadata" style="font-size: 12px; color: #888;"></div>
          </div>
        </div>
      </div>

      <!-- Cost Calculator -->
      <div class="section disabled-section" id="cost-calculator-section">
        <div class="section-title">💰 Cost Calculator</div>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
          Estimate token usage and costs for your agent
        </p>
        
        <div class="input-group">
          <label>Expected Conversation Turns</label>
          <input type="number" id="cost-calc-turns" min="1" max="1000" value="10" placeholder="10">
          <small style="display: block; color: #888; margin-top: 2px;">
            Number of back-and-forth exchanges
          </small>
        </div>
        
        <div class="input-group">
          <label>Average Message Length (characters)</label>
          <input type="number" id="cost-calc-length" min="10" max="500" value="50" placeholder="50">
        </div>
        
        <button onclick="calculateAgentCost()" id="calculate-cost-btn" disabled>💰 Calculate Cost</button>
        
        <div id="cost-results" style="margin-top: 15px; display: none;">
          <div style="padding: 15px; background: #1a1a1a; border-radius: 12px;">
            <div style="font-weight: bold; margin-bottom: 10px;">Estimated Costs:</div>
            <div style="color: #888; font-size: 14px;">
              <div>Prompt Tokens: <span id="cost-prompt-tokens">-</span></div>
              <div>Completion Tokens: <span id="cost-completion-tokens">-</span></div>
              <div>Total Tokens: <span id="cost-total-tokens">-</span></div>
              <div style="margin-top: 10px; font-size: 16px; color: #4CAF50;">
                Cost per Conversation: <span id="cost-per-conversation">$-</span>
              </div>
              <div>Model: <span id="cost-model">-</span></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Agent Link -->
      <div class="section disabled-section" id="agent-link-section">
        <div class="section-title">🔗 Share Agent</div>
        
        <button onclick="getAgentShareLink()" id="get-link-btn" disabled>🔗 Get Shareable Link</button>
        
        <div id="agent-link-result" style="margin-top: 15px; display: none;">
          <div style="padding: 15px; background: #1a1a1a; border-radius: 12px;">
            <div style="font-weight: bold; margin-bottom: 10px;">Shareable Link:</div>
            <div style="display: flex; gap: 10px; align-items: center;">
              <input type="text" id="agent-link-url" readonly style="flex: 1; background: #0a0a0a; padding: 8px; border-radius: 6px; border: 1px solid #333;">
              <button onclick="copyAgentLink()" class="button-secondary">📋 Copy</button>
            </div>
            <small style="display: block; color: #888; margin-top: 8px;">
              Link Status: <span id="agent-link-status">-</span>
            </small>
          </div>
        </div>
      </div>

      </div>

      <!-- Placeholder for other providers (coming soon) -->
      <div id="provider-openai" class="provider-content" style="display: none;">
        <div class="section">
          <div class="section-title">🧠 OpenAI Agents</div>
          <p style="color: #888; font-size: 14px; padding: 40px 20px; text-align: center;">
            OpenAI conversational agent integration coming soon!<br>
            <small style="color: #666;">Stay tuned for GPT-4 powered voice agents.</small>
          </p>
        </div>
      </div>

    </div>
  </template>

  <!-- Body Section (Visual Configuration) -->
  <template id="body-template">
    <div class="sidebar-content">
      <h2>🧬 Body</h2>
      <p class="subtitle">Visual Configuration</p>

      <!-- Quick Variations -->
      <div class="section">
        <div class="section-title">⚡ Quick Variants</div>
        <div class="parameter-group">
          <div class="button-row">
            <button class="button-secondary" onclick="randomizeBlob()" title="Randomize blob shape and colors">🎲 Random Blob</button>
            <button class="button-secondary" onclick="randomizeBackground()" title="Generate random gradient colors">🎨 Random Bg Gradient</button>
          </div>
          <div class="button-row" style="margin-top: 8px;">
            <button class="button-secondary" onclick="randomizeMediaSelection('image')" title="Select random background image">🖼️ Random Bg Image</button>
            <button class="button-secondary" onclick="randomizeMediaSelection('video')" title="Select random background video">🎥 Random Bg Video</button>
          </div>
          <div class="button-row" style="margin-top: 8px;">
            <button class="button-secondary" onclick="randomizeBackgroundWithGlass()" title="Random background with glass effect">🪟 Random Bg Glass</button>
            <button class="button-secondary" onclick="randomize3DTexture()" title="Randomize blob surface texture">🧶 Random 3D Texture</button>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">🌈 Background</div>
        
        <div class="parameter-group">
          <div class="parameter-group-title">Canvas Gradient</div>

          <div class="slider-control">
            <label>Opacity <span class="value-display" id="bg-opacity-value">1.0</span></label>
            <input type="range" id="bg-opacity" min="0" max="1" step="0.01" value="1">
          </div>

          <div class="slider-control">
            <label>Angle <span class="value-display" id="bg-gradient-angle-value">90</span>°</label>
            <input type="range" id="bg-gradient-angle" min="0" max="360" step="1" value="90">
          </div>

          <div class="slider-control">
            <label>Color Stop 1 <span class="value-display" id="bg-gradient-stop1-value">50</span>%</label>
            <input type="range" id="bg-gradient-stop1" min="0" max="100" step="1" value="50">
          </div>

          <div class="slider-control">
            <label>Color Stop 2 <span class="value-display" id="bg-gradient-stop2-value">100</span>%</label>
            <input type="range" id="bg-gradient-stop2" min="0" max="100" step="1" value="100">
          </div>

          <div class="input-group">
            <label>Gradient Layout</label>
            <select id="bg-gradient-style">
              <option value="linear">Linear</option>
              <option value="radial">Radial</option>
              <option value="random">Random</option>
            </select>
          </div>

          <div class="parameter-group gradient-color-group">
            <div class="parameter-group-title">Gradient Colors</div>
            <div class="color-control">
              <label>Color 1</label>
              <input type="color" id="bg-color-1" value="#667eea">
            </div>
            <div class="color-control">
              <label>Color 2</label>
              <input type="color" id="bg-color-2" value="#764ba2">
            </div>
            <div class="color-control">
              <label>Color 3</label>
              <input type="color" id="bg-color-3" value="#f093fb">
            </div>
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Media Background</div>

          <div class="input-group">
            <label>Media Source</label>
            <div class="media-tabs" id="bg-media-tabs">
              <button type="button" class="media-tab active" data-media="none">None</button>
              <button type="button" class="media-tab" data-media="image">Image</button>
              <button type="button" class="media-tab" data-media="video">Video</button>
            </div>
          </div>

          <div id="media-image-controls" class="media-controls" style="display: none;">
            <div class="input-group">
              <label>Image Presets</label>
              <select id="bg-media-image">
                <option value="">None</option>
                <option value="src/assets/img/alaska.jpeg">Alaska</option>
                <option value="src/assets/img/binary-reality.jpg">Binary Reality</option>
                <option value="src/assets/img/black-candle.jpg">Black Candle</option>
                <option value="src/assets/img/black-hole.jpg">Black Hole</option>
                <option value="src/assets/img/black-sea.jpg">Black Sea</option>
                <option value="src/assets/img/black-windows.jpg">Black Windows</option>
                <option value="src/assets/img/black.jpg">Black</option>
                <option value="src/assets/img/colors.jpeg">Colors</option>
                <option value="src/assets/img/galaxy.jpg">Galaxy</option>
                <option value="src/assets/img/galaxy2.jpg">Galaxy 2</option>
                <option value="src/assets/img/galaxy3.jpg">Galaxy 3</option>
                <option value="src/assets/img/galaxy4.jpg">Galaxy 4</option>
                <option value="src/assets/img/gargantua.jpg">Gargantua</option>
                <option value="src/assets/img/interstellar.png">Interstellar</option>
                <option value="src/assets/img/islan.jpg">Island</option>
                <option value="src/assets/img/lake.jpg">Lake</option>
                <option value="src/assets/img/mountain.jpeg">Mountain</option>
                <option value="src/assets/img/paisaje.jpg">Paisaje</option>
                <option value="src/assets/img/pik.jpg">Pik</option>
                <option value="src/assets/img/planet.jpg">Planet</option>
                <option value="src/assets/img/planet2.jpg">Planet 2</option>
                <option value="src/assets/img/planet3.jpg">Planet 3</option>
                <option value="src/assets/img/sahara.jpeg">Sahara</option>
                <option value="src/assets/img/skinet.png">Skinet</option>
                <option value="src/assets/img/skynet.png">Skynet</option>
                <option value="src/assets/img/universe.jpg">Universe</option>
                <option value="src/assets/img/white-tree.jpg">White Tree</option>
              </select>
            </div>
            <div class="button-row">
              <button class="button-secondary" type="button" onclick="randomizeMediaSelection('image')">🎴 Random Image</button>
              <button class="button-secondary" type="button" onclick="clearMediaSelection('image')">🚫 Clear Image</button>
            </div>
          </div>

          <div id="media-video-controls" class="media-controls" style="display: none;">
            <div class="input-group">
              <label>Video Presets</label>
              <select id="bg-media-video">
                <option value="">Select a video...</option>
                <option value="src/assets/vid/stars.mp4">Stars (Local)</option>
                <option value="https://storage.coverr.co/videos/coverr-blue-particles-background-1581083411/1080p.mp4">Blue Particles</option>
                <option value="https://storage.coverr.co/videos/coverr-purple-nebula-1584717401/1080p.mp4">Purple Nebula</option>
                <option value="https://storage.coverr.co/videos/coverr-journey-through-space-1570107498/1080p.mp4">Space Journey</option>
              </select>
            </div>
            <div class="button-row">
              <button class="button-secondary" type="button" onclick="randomizeMediaSelection('video')">🎥 Random Video</button>
              <button class="button-secondary" type="button" onclick="clearMediaSelection('video')">🚫 Clear Video</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Geometry & Motion -->
      <div class="section">
        <div class="section-title">🧬 Geometry & Motion</div>
        
        <div class="parameter-group">
          <div class="parameter-group-title">Noise Frequency</div>
          <p class="parameter-info">Control how much the blob stretches along each axis.</p>
          <div class="slider-control">
            <label>X <span class="value-display" id="spike-x-value">0.2</span></label>
            <input type="range" id="spike-x" min="0" max="25" step="0.1" value="0.2">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="spike-y-value">0.2</span></label>
            <input type="range" id="spike-y" min="0" max="25" step="0.1" value="0.2">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="spike-z-value">0.2</span></label>
            <input type="range" id="spike-z" min="0" max="25" step="0.1" value="0.2">
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Animation Speed</div>
          <p class="parameter-info">Change how quickly the blob cycles through its movement.</p>

          </div>
          <input type="range" id="patience-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('patience', this.value)">
        </div>

        <!-- Empathy/Selfishness -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">🙅 Selfishness</span>
            <span id="empathy-value" class="trait-value">0</span>
            <span class="trait-label-right">Empathy 💖</span>
          </div>
          <input type="range" id="empathy-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('empathy', this.value)">
        </div>

        <!-- Curiosity/Indifference -->
        <div class="parameter-group trait-group">
          <div class="trait-header">
            <span class="trait-label-left">😑 Indifference</span>
            <span id="curiosity-value" class="trait-value">0</span>
            <span class="trait-label-right">Curiosity 🔍</span>
          </div>
          <input type="range" id="curiosity-slider" class="trait-slider" min="-100" max="100" value="0" step="1" 
                 oninput="updateEmotionalTrait('curiosity', this.value)">
        </div>

        <button class="button-secondary" onclick="resetEmotionalTraits()">🔄 Reset to Neutral</button>
      </div>

      <!-- Save Configuration Section -->
      <div class="section">
        <div class="section-title">💾 Save Configuration</div>
        <p class="about-text">Save your custom personality configuration for future use.</p>
        
        <div class="input-group">
          <label>Configuration Name</label>
          <input type="text" id="save-config-name" placeholder="My Custom Personality" value="">
        </div>

        <button class="button-primary" onclick="savePersonalityConfig()">💾 Save Personality</button>
        <button class="button-secondary" onclick="deleteSavedPersonality()">🗑️ Delete Selected</button>
      </div>
    </div>
  </template>

  <script src="agent-management-functions.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
