<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kwami Playground</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Left Sidebar -->
    <div id="left-sidebar">
      <button class="swap-button" id="left-swap-btn" onclick="swapLeftSidebar()">
        <span id="left-swap-text">→ Soul</span>
      </button>
      <div id="left-content"></div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container">
      <!-- Menu Toggle Button -->
      <button id="menu-toggle-btn" class="menu-toggle-btn" onclick="toggleMenus()" title="Toggle Sidebars">
        <span id="menu-toggle-icon">☰</span>
      </button>
      
      <!-- GitHub Star Button -->
      <a id="github-star-btn" class="github-star-btn" href="https://github.com/alexcolls/kwami" target="_blank" title="Star on GitHub">
        <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path>
        </svg>
        <span>Star</span>
        <span id="star-count">...</span>
      </a>
      
      <!-- Audio Player -->
      <div id="audio-player">
        <input type="file" id="audio-file" accept="audio/*" style="display: none;">
        <button id="upload-audio-btn" class="player-btn" title="Upload Audio">📁</button>
        <button id="play-pause-btn" class="player-btn" disabled title="Play/Pause">▶️</button>
        <div id="audio-info">
          <span id="audio-name">No audio loaded</span>
          <span id="audio-time">0:00 / 0:00</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="100" value="80" title="Volume">
        <span id="volume-icon">🔊</span>
      </div>
      
      <div id="background-image"></div>
      <div id="canvas-overlay"></div>
      <canvas id="kwami-canvas"></canvas>
      
      <!-- State Indicator (Below Blob) -->
      <div id="state-indicator" class="state-indicator">
        <span id="state-text">IDLE</span>
      </div>

      <!-- Messages Area (Below Blob) -->
      <div id="messages-container">
        <div id="status" class="message"></div>
        <div id="error" class="message error-message"></div>
      </div>
      </div>

    <!-- Right Sidebar -->
    <div id="right-sidebar">
      <button class="swap-button" id="right-swap-btn" onclick="swapRightSidebar()">
        <span id="right-swap-text">Soul ←</span>
      </button>
      <div id="right-content"></div>
    </div>
  </div>

  <!-- Mind Section (AI Agent Configuration) -->
  <template id="mind-template">
    <div class="sidebar-content">
      <h1>🤖 Mind</h1>
      <p class="subtitle">AI Agent Configuration</p>

      <!-- Authentication -->
      <div class="section">
        <div class="section-title">🔑 Authentication</div>
        
        <div class="input-group">
          <label>API Key</label>
          <input type="password" id="api-key" placeholder="Enter ElevenLabs API Key">
        </div>

        <button onclick="initializeMind()" id="init-btn">Initialize AI Agent</button>
      </div>

      <!-- Voice Configuration -->
      <div class="section">
        <div class="section-title">🎙️ Voice Configuration</div>
        
        <div class="input-group">
          <label>Voice Selection</label>
          <select id="voice-id">
            <option value="pNInz6obpgDQGcFmaJgB">Adam (Deep, Professional)</option>
            <option value="EXAVITQu4vr4xnSDxMaL">Bella (Soft, Female)</option>
            <option value="ErXwobaYiN019PkySvjV">Antoni (Well-rounded, Male)</option>
            <option value="MF3mGyEYCl7XYWbV9V6O">Elli (Emotional, Female)</option>
            <option value="TxGEqnHWrfWFTfGW9XjX">Josh (Young, Male)</option>
            <option value="VR6AewLTigWG4xSOukaG">Arnold (Crisp, Male)</option>
            <option value="pqHfZKP75CvOlQylNhV4">Bill (Strong, Male)</option>
            <option value="nPczCjzI2devNBz1zQrb">Brian (Deep, Authoritative)</option>
            <option value="N2lVS1w4EtoT3dr4eOWO">Callum (Hoarse, Male)</option>
            <option value="IKne3meq5aSn9XLyUdCD">Charlie (Casual, Male)</option>
            <option value="XB0fDUnXU5powFXDhCwa">Charlotte (Seductive, Female)</option>
            <option value="iP95p4xoKVk53GoZ742B">Chris (Casual, American)</option>
            <option value="onwK4e9ZLuTAKqWW03F9">Daniel (Deep, Authoritative)</option>
            <option value="cjVigY5qzO86Huf0OWal">Eric (Friendly, Male)</option>
            <option value="JBFqnCBsd6RMkjVDRZzb">George (Warm, British)</option>
            <option value="cgSgspJ2msm6clMCkdW9">Jessica (Expressive, Female)</option>
            <option value="FGY2WhTYpPnrIDTdsKH5">Laura (Upbeat, Female)</option>
            <option value="jBpfuIE2acCO8z3wKNLl">Lily (Raspy, Female)</option>
            <option value="t0jbNlBVZ17f02VDIeMI">Matilda (Warm, Female)</option>
            <option value="custom">Custom Voice ID...</option>
          </select>
        </div>

        <div class="input-group" id="custom-voice-container" style="display: none;">
          <label>Custom Voice ID</label>
          <input type="text" id="custom-voice-id" placeholder="Enter custom voice ID">
        </div>

        <button class="button-secondary" onclick="loadAvailableVoices()">📋 Load My Voices</button>
        <div id="available-voices-list" style="display: none; margin-top: 10px;">
          <select id="user-voices" size="5" style="width: 100%;">
            <!-- Dynamically populated -->
          </select>
          <button class="button-secondary" onclick="selectUserVoice()" style="margin-top: 5px;">Use Selected Voice</button>
        </div>

        <div class="input-group">
          <label>Model</label>
          <select id="voice-model">
            <option value="eleven_multilingual_v2" selected>Eleven Multilingual v2 (Recommended)</option>
            <option value="eleven_turbo_v2">Eleven Turbo v2 (Fastest)</option>
            <option value="eleven_turbo_v2_5">Eleven Turbo v2.5 (Balanced)</option>
            <option value="eleven_monolingual_v1">Eleven Monolingual v1 (English Only)</option>
            <option value="eleven_multilingual_v1">Eleven Multilingual v1 (Legacy)</option>
          </select>
        </div>

        <div class="input-group">
          <label>Language</label>
          <select id="voice-language">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="pl">Polish</option>
            <option value="nl">Dutch</option>
            <option value="ja">Japanese</option>
            <option value="zh">Chinese</option>
            <option value="ko">Korean</option>
            <option value="ar">Arabic</option>
            <option value="hi">Hindi</option>
            <option value="ru">Russian</option>
            <option value="tr">Turkish</option>
          </select>
        </div>
      </div>

      <!-- Voice Settings (Fine-tuning) -->
      <div class="section">
        <div class="section-title">🎚️ Voice Settings</div>
        
        <div class="parameter-group">
          <div class="parameter-group-title">Voice Characteristics</div>
          <p class="parameter-info">Fine-tune how the voice sounds</p>
          
          <div class="slider-control">
            <label>Stability <span class="value-display" id="voice-stability-value">0.50</span></label>
            <input type="range" id="voice-stability" min="0" max="1" step="0.05" value="0.5">
            <small style="display: block; color: #888; margin-top: 2px;">Low: More expressive | High: More consistent</small>
          </div>
          
          <div class="slider-control">
            <label>Similarity Boost <span class="value-display" id="voice-similarity-value">0.75</span></label>
            <input type="range" id="voice-similarity" min="0" max="1" step="0.05" value="0.75">
            <small style="display: block; color: #888; margin-top: 2px;">Higher values enhance voice clarity</small>
          </div>
          
          <div class="slider-control">
            <label>Style <span class="value-display" id="voice-style-value">0.00</span></label>
            <input type="range" id="voice-style" min="0" max="1" step="0.05" value="0">
            <small style="display: block; color: #888; margin-top: 2px;">Adds expressiveness (use with caution)</small>
          </div>
          
          <div class="input-group">
            <label>
              <input type="checkbox" id="voice-speaker-boost" checked>
              Speaker Boost (Enhanced clarity)
            </label>
          </div>
        </div>

        <button class="button-secondary" onclick="applyVoiceSettings()">✅ Apply Voice Settings</button>
      </div>

      <!-- Advanced TTS Options -->
      <div class="section">
        <div class="section-title">⚙️ Advanced TTS Options</div>
        
        <div class="input-group">
          <label>Output Format</label>
          <select id="tts-output-format">
            <option value="mp3_44100_128" selected>MP3 - 44.1kHz, 128kbps (Recommended)</option>
            <option value="mp3_44100_64">MP3 - 44.1kHz, 64kbps (Smaller size)</option>
            <option value="mp3_44100_192">MP3 - 44.1kHz, 192kbps (High quality)</option>
            <option value="pcm_16000">PCM - 16kHz (Low latency)</option>
            <option value="pcm_22050">PCM - 22.05kHz (Balanced)</option>
            <option value="pcm_24000">PCM - 24kHz (Good quality)</option>
            <option value="pcm_44100">PCM - 44.1kHz (CD quality)</option>
          </select>
        </div>

        <div class="input-group">
          <label>
            <input type="checkbox" id="tts-optimize-latency">
            Optimize Streaming Latency
          </label>
          <small style="display: block; color: #888; margin-top: 2px;">Reduces delay for real-time applications</small>
        </div>

        <div class="slider-control">
          <label>Next Text Timeout <span class="value-display" id="tts-next-text-value">1000</span>ms</label>
          <input type="range" id="tts-next-text" min="100" max="5000" step="100" value="1000">
          <small style="display: block; color: #888; margin-top: 2px;">Wait time before processing next chunk</small>
        </div>
      </div>

      <!-- Conversational AI Settings -->
      <div class="section">
        <div class="section-title">💬 Conversational AI</div>
        
        <div class="input-group">
          <label>Agent ID (Required for Conversations)</label>
          <input type="text" id="agent-id" placeholder="Enter your ElevenLabs Agent ID">
          <small style="display: block; color: #888; margin-top: 2px;">Get your agent ID from elevenlabs.io dashboard</small>
        </div>
        
        <!-- Container for embedded conversation iframe -->
        <div id="elevenlabs-embed-container" style="display: none; margin-top: 15px; border-radius: 12px; overflow: hidden; background: #1a1a1a;">
          <!-- Iframe will be inserted here dynamically -->
        </div>

        <div class="input-group">
          <label>First Message</label>
          <textarea id="conversation-first-message" placeholder="Agent's opening message...">Hello! How can I help you today?</textarea>
        </div>

        <div class="input-group">
          <label>Max Duration (seconds)</label>
          <input type="number" id="conversation-max-duration" min="10" max="3600" value="300" placeholder="300">
        </div>

        <div class="input-group">
          <label>
            <input type="checkbox" id="conversation-interruption">
            Allow Interruption
          </label>
          <small style="display: block; color: #888; margin-top: 2px;">User can interrupt the agent while speaking</small>
        </div>

        <button onclick="startConversation()" id="start-conversation-btn" disabled>🎙️ Start Conversation</button>
        <button onclick="stopConversation()" id="stop-conversation-btn" disabled style="display: none;">⏹️ Stop Conversation</button>
      </div>

      <!-- Speech-to-Text Settings -->
      <div class="section">
        <div class="section-title">🎤 Speech-to-Text</div>
        
        <div class="input-group">
          <label>STT Model</label>
          <select id="stt-model">
            <option value="base" selected>Base (Fast, less accurate)</option>
            <option value="small">Small (Balanced)</option>
            <option value="medium">Medium (Good accuracy)</option>
            <option value="large">Large (Best accuracy, slower)</option>
          </select>
        </div>

        <div class="input-group">
          <label>
            <input type="checkbox" id="stt-punctuation" checked>
            Automatic Punctuation
          </label>
        </div>

        <div class="input-group">
          <label>
            <input type="checkbox" id="stt-diarization">
            Speaker Diarization
          </label>
          <small style="display: block; color: #888; margin-top: 2px;">Identify different speakers</small>
        </div>

        <button onclick="testMicrophone()" id="test-mic-btn" disabled>🎤 Test Microphone</button>
        <div id="mic-status" style="margin-top: 10px; display: none;">
          <small style="color: #888;">Microphone status: <span id="mic-status-text">Not detected</span></small>
        </div>
      </div>

      <!-- Pronunciation & Phonetics -->
      <div class="section">
        <div class="section-title">📖 Pronunciation</div>
        
        <div class="input-group">
          <label>Pronunciation Dictionary</label>
          <textarea id="pronunciation-dict" placeholder="word:pronunciation (one per line)&#10;Example:&#10;Kwami:kwah-mee&#10;AI:ay-eye" style="min-height: 80px;"></textarea>
          <small style="display: block; color: #888; margin-top: 2px;">Custom pronunciations for specific words</small>
        </div>

        <div class="input-group">
          <label>
            <input type="checkbox" id="use-phonemes">
            Use IPA Phonemes
          </label>
          <small style="display: block; color: #888; margin-top: 2px;">Use International Phonetic Alphabet</small>
        </div>

        <button class="button-secondary" onclick="applyPronunciation()">✅ Apply Pronunciation Rules</button>
      </div>

      <!-- Test & Preview -->
      <div class="section">
        <div class="section-title">🎬 Test & Preview</div>
        
        <div class="input-group">
          <label>Text to Speak</label>
          <textarea id="speak-text" placeholder="Enter text for Kwami to speak...">Hello! I am Kwami, your AI companion. Watch as I animate while I speak!</textarea>
        </div>

        <button onclick="speak()" id="speak-btn" disabled>🎤 Speak Text</button>
        <button onclick="previewVoice()" id="preview-btn" disabled class="button-secondary">👂 Preview Voice</button>
        
        <div id="generation-status" style="margin-top: 10px; display: none;">
          <small style="color: #888;">Status: <span id="generation-status-text">Ready</span></small>
        </div>
      </div>

      <!-- Usage & Limits -->
      <div class="section">
        <div class="section-title">📊 Usage Information</div>
        
        <button class="button-secondary" onclick="checkUsage()">🔍 Check API Usage</button>
        
        <div id="usage-info" style="margin-top: 10px; display: none;">
          <div style="font-size: 12px; color: #888;">
            <div>Characters Used: <span id="usage-characters">-</span></div>
            <div>Character Limit: <span id="usage-limit">-</span></div>
            <div>Remaining: <span id="usage-remaining">-</span></div>
          </div>
        </div>
      </div>

      <!-- Presets & Quick Actions -->
      <div class="section">
        <div class="section-title">⚡ Quick Actions</div>
        
        <div class="parameter-group">
          <div class="parameter-group-title">Voice Presets</div>
          <button class="button-secondary" onclick="applyVoicePreset('natural')">🌿 Natural</button>
          <button class="button-secondary" onclick="applyVoicePreset('expressive')">🎭 Expressive</button>
          <button class="button-secondary" onclick="applyVoicePreset('stable')">🎯 Stable</button>
          <button class="button-secondary" onclick="applyVoicePreset('clear')">💎 Clear & Crisp</button>
    </div>

        <button class="button-secondary" onclick="exportMindConfig()">💾 Export Configuration</button>
        <button class="button-secondary" onclick="importMindConfig()">📂 Import Configuration</button>
        <input type="file" id="mind-config-import" accept=".json" style="display: none;">
      </div>
    </div>
  </template>

  <!-- Body Section (Visual Configuration) -->
  <template id="body-template">
    <div class="sidebar-content">
      <h2>🎨 Body</h2>
      <p class="subtitle">Visual Configuration</p>

      <!-- Background -->
      <div class="section">
        <div class="section-title">🌈 Background</div>
        
        <div class="input-group">
          <label>Canvas Background</label>
          <select id="bg-type">
            <option value="gradient">Gradient</option>
            <option value="solid">Solid Color</option>
            <option value="transparent">Transparent</option>
          </select>
        </div>

        <div id="opacity-control">
          <div class="slider-control">
            <label>Opacity <span class="value-display" id="bg-opacity-value">1.0</span></label>
            <input type="range" id="bg-opacity" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

        <div class="input-group">
          <label>Background Image</label>
          <select id="bg-image">
            <option value="">None</option>
            <option value="alaska.jpeg">Alaska</option>
            <option value="binary-reality.jpg">Binary Reality</option>
            <option value="black-candle.jpg">Black Candle</option>
            <option value="black-hole.jpg">Black Hole</option>
            <option value="black-sea.jpg">Black Sea</option>
            <option value="black-windows.jpg">Black Windows</option>
            <option value="black.jpg">Black</option>
            <option value="colors.jpeg">Colors</option>
            <option value="galaxy.jpg">Galaxy</option>
            <option value="galaxy2.jpg">Galaxy 2</option>
            <option value="galaxy3.jpg">Galaxy 3</option>
            <option value="galaxy4.jpg">Galaxy 4</option>
            <option value="gargantua.jpg">Gargantua</option>
            <option value="interstellar.png">Interstellar</option>
            <option value="islan.jpg">Island</option>
            <option value="lake.jpg">Lake</option>
            <option value="mountain.jpeg">Mountain</option>
            <option value="paisaje.jpg">Paisaje</option>
            <option value="pik.jpg">Pik</option>
            <option value="planet.jpg">Planet</option>
            <option value="planet2.jpg">Planet 2</option>
            <option value="planet3.jpg">Planet 3</option>
            <option value="sahara.jpeg">Sahara</option>
            <option value="skinet.png">Skinet</option>
            <option value="skynet.png">Skynet</option>
            <option value="universe.jpg">Universe</option>
            <option value="white-tree.jpg">White Tree</option>
          </select>
        </div>

        <div id="gradient-controls">
          <div class="parameter-group">
            <div class="parameter-group-title">Gradient Colors</div>
            <div class="color-control">
              <label>Color 1</label>
              <input type="color" id="bg-color-1" value="#667eea">
            </div>
            <div class="color-control">
              <label>Color 2</label>
              <input type="color" id="bg-color-2" value="#764ba2">
            </div>
            <div class="color-control">
              <label>Color 3</label>
              <input type="color" id="bg-color-3" value="#f093fb">
            </div>
          </div>
          <div class="input-group">
            <label>Angle (°)</label>
            <input type="range" id="bg-gradient-angle" min="0" max="360" step="1" value="90">
            <span id="bg-gradient-angle-value">90</span>°
          </div>
          <div class="input-group">
            <label>Color Stop 1 (%)</label>
            <input type="range" id="bg-gradient-stop1" min="0" max="100" step="1" value="0">
            <span id="bg-gradient-stop1-value">0</span>%
          </div>
          <div class="input-group">
            <label>Color Stop 2 (%)</label>
            <input type="range" id="bg-gradient-stop2" min="0" max="100" step="1" value="100">
            <span id="bg-gradient-stop2-value">100</span>%
          </div>
          <div class="input-group">
            <label>Direction</label>
            <select id="bg-direction">
              <option value="vertical">Vertical</option>
              <option value="horizontal">Horizontal</option>
              <option value="radial">Radial</option>
            </select>
          </div>
        </div>

        <div id="solid-controls" style="display: none;">
          <div class="color-control">
            <label>Background Color</label>
            <input type="color" id="bg-solid-color" value="#667eea">
          </div>
        </div>


        <button class="button-secondary" onclick="randomizeBackground()">🎲 Randomize Background</button>
        <button class="button-secondary" onclick="randomizeBackgroundImage()">🖼️ Random Image</button>
      </div>

      <!-- Geometry & Motion -->
      <div class="section">
        <div class="section-title">🧬 Geometry & Motion</div>
        
        <div class="parameter-group">
          <div class="parameter-group-title">Noise Frequency</div>
          <p class="parameter-info">Control how much the blob stretches along each axis.</p>
          <div class="slider-control">
            <label>X <span class="value-display" id="spike-x-value">0.2</span></label>
            <input type="range" id="spike-x" min="0" max="20" step="0.1" value="0.2">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="spike-y-value">0.2</span></label>
            <input type="range" id="spike-y" min="0" max="20" step="0.1" value="0.2">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="spike-z-value">0.2</span></label>
            <input type="range" id="spike-z" min="0" max="20" step="0.1" value="0.2">
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Animation Speed</div>
          <p class="parameter-info">Change how quickly the blob cycles through its movement.</p>
          <div class="slider-control">
            <label>X <span class="value-display" id="time-x-value">1.0</span></label>
            <input type="range" id="time-x" min="0" max="5" step="0.1" value="1">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="time-y-value">1.0</span></label>
            <input type="range" id="time-y" min="0" max="5" step="0.1" value="1">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="time-z-value">1.0</span></label>
            <input type="range" id="time-z" min="0" max="5" step="0.1" value="1">
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Auto Rotation</div>
          <div class="slider-control">
            <label>X <span class="value-display" id="rotation-x-value">0.000</span></label>
            <input type="range" id="rotation-x" min="0" max="0.01" step="0.001" value="0">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="rotation-y-value">0.000</span></label>
            <input type="range" id="rotation-y" min="0" max="0.01" step="0.001" value="0">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="rotation-z-value">0.000</span></label>
            <input type="range" id="rotation-z" min="0" max="0.01" step="0.001" value="0">
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Mesh Detail</div>
          <div class="slider-control">
            <label>Resolution <span class="value-display" id="resolution-value">180</span></label>
            <input type="range" id="resolution" min="120" max="220" step="1" value="180">
          </div>
        </div>
      </div>

      <!-- Scale & Camera -->
      <div class="section">
        <div class="section-title">📐 Scale & Camera</div>
        <div class="parameter-group">
          <div class="parameter-group-title">Global Scale</div>
          <div class="slider-control">
            <label>Scale <span class="value-display" id="scale-value">4.0</span></label>
            <input type="range" id="scale" min="3" max="8" step="0.1" value="4.0">
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Camera Orbit</div>
          <p class="parameter-info">Fine-tune the default camera orbit around the blob.</p>
          <div class="slider-control">
            <label>X <span class="value-display" id="camera-x-value">-0.9</span></label>
            <input type="range" id="camera-x" min="-20" max="20" step="0.5" value="-0.9">
          </div>
          <div class="slider-control">
            <label>Y <span class="value-display" id="camera-y-value">7.3</span></label>
            <input type="range" id="camera-y" min="-20" max="20" step="0.5" value="7.3">
          </div>
          <div class="slider-control">
            <label>Z <span class="value-display" id="camera-z-value">-1.8</span></label>
            <input type="range" id="camera-z" min="-20" max="30" step="0.5" value="-1.8">
          </div>
        </div>
      </div>

      <!-- Skin & Surface -->
      <div class="section">
        <div class="section-title">🖌️ Skin & Surface</div>

        <div class="parameter-group">
          <div class="parameter-group-title">Skin Selection</div>
          <div class="input-group">
            <label>Skin Type</label>
            <select id="skin-type">
              <option value="tricolor">Tricolor</option>
              <option value="tricolor2">Tricolor 2 (Donut)</option>
              <option value="zebra">Zebra</option>
            </select>
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Palette</div>
          <p class="parameter-info">These colors apply to every skin. Adjust them to re-tint the material.</p>
          <div class="color-control">
            <label>Primary</label>
            <input type="color" id="color-x" value="#ff0066">
          </div>
          <div class="color-control">
            <label>Secondary</label>
            <input type="color" id="color-y" value="#00ff66">
          </div>
          <div class="color-control">
            <label>Accent</label>
            <input type="color" id="color-z" value="#6600ff">
          </div>
        </div>

        <div class="parameter-group">
          <div class="parameter-group-title">Material</div>
          <div class="slider-control">
            <label>Opacity <span class="value-display" id="blob-opacity-value">1.00</span></label>
            <input type="range" id="blob-opacity" min="0" max="1" step="0.01" value="1">
            <label class="slider-checkbox">
              <input type="checkbox" id="blob-image-transparency">
              Enable Blob Transparency
            </label>
            <div class="slider-select" id="blob-transparency-mode-wrapper" style="display: none;">
              <label for="blob-transparency-mode">Transparency Mode</label>
              <select id="blob-transparency-mode">
                <option value="overlay">Image Fill (inside the blob)</option>
                <option value="glass">Glass Window (image behind the blob)</option>
              </select>
              <small class="checkbox-hint">Pick how the blob interacts with the background image</small>
            </div>
            <small class="checkbox-hint">Toggle to blend the blob with the background image</small>
          </div>
          <div class="slider-control">
            <label>Shininess <span class="value-display" id="shininess-value">50</span></label>
            <input type="range" id="shininess" min="1" max="200" step="1" value="50">
          </div>
          <div class="slider-control">
            <label>Light Intensity <span class="value-display" id="light-intensity-value">0</span></label>
            <input type="range" id="light-intensity" min="0" max="5" step="0.1" value="0">
          </div>
          <div class="input-group">
            <label>
              <input type="checkbox" id="wireframe">
              Wireframe Mode
            </label>
          </div>
        </div>
      </div>

      <!-- Audio Effects Configuration -->
      <div class="section">
        <div class="section-title">🎵 Audio Effects</div>
        
        <!-- Audio Effect Multipliers -->
        <div class="parameter-group">
          <div class="parameter-group-title">Frequency Modulation</div>
          <p class="parameter-info">Boost how strongly each frequency band pushes the blob. <span style="display:block;color:#999;font-size:11px;">The blob remembers your settings per skin.</span></p>
          <div class="slider-control">
            <label>Bass Movement <span class="value-display" id="audio-bass-spike-value">0.45</span></label>
            <input type="range" id="audio-bass-spike" min="0" max="1" step="0.05" value="0.45">
          </div>
          <div class="slider-control">
            <label>Mid Flow <span class="value-display" id="audio-mid-spike-value">0.35</span></label>
            <input type="range" id="audio-mid-spike" min="0" max="1" step="0.05" value="0.35">
          </div>
          <div class="slider-control">
            <label>High Detail <span class="value-display" id="audio-high-spike-value">0.30</span></label>
            <input type="range" id="audio-high-spike" min="0" max="1" step="0.05" value="0.30">
          </div>
        </div>

        <!-- Time Modulation -->
        <div class="parameter-group">
          <div class="parameter-group-title">Time Modulation</div>
          <p class="parameter-info">Control how audio affects animation speed</p>
          <div class="input-group">
            <label>
              <input type="checkbox" id="audio-time-enabled">
              Enable Time Modulation (Can be chaotic)
            </label>
          </div>
          <div class="slider-control">
            <label>Mid → Speed <span class="value-display" id="audio-mid-time-value">0.2</span></label>
            <input type="range" id="audio-mid-time" min="0" max="2" step="0.1" value="0.2">
          </div>
          <div class="slider-control">
            <label>High → Speed <span class="value-display" id="audio-high-time-value">0.3</span></label>
            <input type="range" id="audio-high-time" min="0" max="2" step="0.1" value="0.3">
          </div>
          <div class="slider-control">
            <label>Ultra → Speed <span class="value-display" id="audio-ultra-time-value">0.15</span></label>
            <input type="range" id="audio-ultra-time" min="0" max="2" step="0.1" value="0.15">
          </div>
        </div>

        <!-- Audio Analyzer Settings -->
        <div class="parameter-group">
          <div class="parameter-group-title">Audio Analyzer</div>
          <div class="slider-control">
            <label>FFT Size <span class="value-display" id="fft-size-value">2048</span></label>
            <select id="fft-size">
              <option value="512">512 (Fast, Low Res)</option>
              <option value="1024">1024 (Balanced)</option>
              <option value="2048" selected>2048 (Default)</option>
              <option value="4096">4096 (High Res)</option>
            </select>
          </div>
          <div class="slider-control">
            <label>Smoothing <span class="value-display" id="smoothing-value">0.7</span></label>
            <input type="range" id="smoothing" min="0" max="1" step="0.05" value="0.7">
          </div>
        </div>

        <!-- Audio Reactive Toggle -->
        <div class="input-group">
          <label>
            <input type="checkbox" id="audio-reactive" checked>
            Enable Audio Reactivity
          </label>
        </div>
      </div>

      <!-- Interaction Configuration -->
      <div class="section">
        <div class="section-title">👆 Interaction</div>
        
        <!-- Touch/Click Effects -->
        <div class="parameter-group">
          <div class="parameter-group-title">Touch/Click Effects</div>
          <div class="input-group">
            <label>
              <input type="checkbox" id="click-interaction" checked>
              Enable Click Interaction
            </label>
          </div>
          <div class="slider-control">
            <label>Touch Strength <span class="value-display" id="touch-strength-value">1.0</span></label>
            <input type="range" id="touch-strength" min="0.1" max="2" step="0.1" value="1.0">
          </div>
          <div class="slider-control">
            <label>Touch Duration <span class="value-display" id="touch-duration-value">1100</span>ms</label>
            <input type="range" id="touch-duration" min="500" max="3000" step="100" value="1100">
          </div>
          <div class="slider-control">
            <label>Max Touch Points <span class="value-display" id="max-touches-value">5</span></label>
            <input type="range" id="max-touches" min="1" max="10" step="1" value="5">
          </div>
        </div>

        <!-- State Transitions -->
        <div class="parameter-group">
          <div class="parameter-group-title">State Transitions</div>
          <div class="slider-control">
            <label>Transition Speed <span class="value-display" id="transition-speed-value">0.05</span></label>
            <input type="range" id="transition-speed" min="0.01" max="0.2" step="0.01" value="0.05">
          </div>
          <div class="slider-control">
            <label>Thinking Duration <span class="value-display" id="thinking-duration-value">10</span>s</label>
            <input type="range" id="thinking-duration" min="3" max="30" step="1" value="10">
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="section">
        <div class="section-title">⚡ Actions</div>
        <button class="button-secondary" onclick="randomizeBlob()">🎲 Randomize Blob</button>
        <button class="button-secondary" onclick="exportGLB()">💾 Download GLB</button>
        <button class="button-secondary" onclick="testThinking()">🤔 Test Thinking Mode</button>
        <button class="button-secondary" onclick="testListening()">👂 Test Listening Mode</button>
      </div>
    </div>
  </template>

  <!-- Soul Section (Personality Configuration) -->
  <template id="soul-template">
    <div class="sidebar-content">
      <h2>✨ Soul</h2>
      <p class="subtitle">Personality Configuration</p>

      <div class="section">
        <div class="section-title">🎭 Personality</div>
        <p class="about-text">Define who Kwami is - their character, traits, and communication style.</p>
        
        <div class="input-group">
          <label>Name</label>
          <input type="text" id="soul-name" value="Kwami" placeholder="Kwami's name">
        </div>

        <div class="input-group">
          <label>Personality Description</label>
          <textarea id="soul-personality" placeholder="Describe Kwami's personality...">Friendly, helpful, and curious AI companion with a playful spirit.</textarea>
        </div>

        <div class="input-group">
          <label>System Prompt</label>
          <textarea id="soul-system-prompt" placeholder="Base instructions for AI behavior..." style="min-height: 120px;">You are Kwami, a friendly AI companion. You are helpful, curious, and enjoy engaging conversations. Keep responses natural and concise.</textarea>
        </div>

        <div class="input-group">
          <label>Response Length</label>
          <select id="soul-response-length">
            <option value="short">Short</option>
            <option value="medium" selected>Medium</option>
            <option value="long">Long</option>
          </select>
        </div>

        <div class="input-group">
          <label>Emotional Tone</label>
          <select id="soul-emotional-tone">
            <option value="neutral">Neutral</option>
            <option value="warm" selected>Warm</option>
            <option value="enthusiastic">Enthusiastic</option>
            <option value="calm">Calm</option>
          </select>
        </div>

        <button class="button-secondary" onclick="applySoulConfig()">✅ Apply Soul Config</button>
      </div>

      <div class="section">
        <div class="section-title">🎨 Preset Personalities</div>
        
        <div class="personality-buttons">
          <button class="button-secondary" onclick="loadPersonality('friendly')">😊 Kaya</button>
          <button class="button-secondary" onclick="loadPersonality('professional')">💼 Nexus</button>
          <button class="button-secondary" onclick="loadPersonality('playful')">✨ Spark</button>
  </div>

        <div class="input-group">
          <label>Current Name: <span id="personality-name">Kwami</span></label>
        </div>
      </div>
    </div>
  </template>

  <script type="module" src="main.js"></script>
</body>
</html>
