# Example: Instagram Post Action
# This demonstrates a future complex integration action
id: instagram-post
name: Post to Instagram
description: Create and publish a post to Instagram with AI-generated content and image
category: integration
version: 1.0.0
author: Kwami Team
tags:
  - social
  - instagram
  - ai-generated
enabled: false # Disabled until implementation ready

triggers:
  - context-menu
  - voice-command
  - api

shortcuts:
  voice:
    - "post to instagram"
    - "share on instagram"

parameters:
  - name: caption
    type: string
    label: Caption
    description: Post caption (will be generated by AI if not provided)
    required: false
  
  - name: imageUrl
    type: file
    label: Image
    description: Image to post (will be generated if not provided)
    required: false
  
  - name: generateCaption
    type: boolean
    label: Generate Caption
    description: Use AI to generate an engaging caption
    required: false
    default: true
  
  - name: generateImage
    type: boolean
    label: Generate Image
    description: Use AI to generate an image
    required: false
    default: false
  
  - name: prompt
    type: string
    label: Prompt
    description: Prompt for AI generation (caption and/or image)
    required: false

permissions:
  level: user
  scopes:
    - instagram.post
  requiresConsent: true

confirmation:
  required: true
  message: Are you sure you want to post to Instagram?

# Handler would be implemented in the integration
handler: integration.instagram.post

timeout: 60000

ui:
  showInContextMenu: true
  menuLabel: 📸 Post to Instagram
  menuIcon: instagram
  menuOrder: 100
  menuGroup: social

integration:
  service: instagram
  type: social
  auth:
    type: oauth
    required: true

# MCP (Model Context Protocol) definition for AI agents
mcp:
  name: post_to_instagram
  description: Creates and publishes a post to Instagram. Can generate captions and images using AI.
  inputSchema:
    type: object
    properties:
      caption:
        type: string
        description: The caption for the post
      imageUrl:
        type: string
        description: URL of the image to post
      generateCaption:
        type: boolean
        description: Whether to use AI to generate the caption
      generateImage:
        type: boolean
        description: Whether to use AI to generate an image
      prompt:
        type: string
        description: Prompt for AI generation
    required: []

