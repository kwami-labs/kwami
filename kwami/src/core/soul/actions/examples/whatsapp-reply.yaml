# Example: WhatsApp Reply Action
# This demonstrates personalized messaging based on personality
id: whatsapp-reply-mom
name: Reply to Mom on WhatsApp
description: Send a WhatsApp message to mom in your personal style
category: integration
version: 1.0.0
author: Kwami Team
tags:
  - messaging
  - whatsapp
  - personalized
enabled: false # Disabled until implementation ready

triggers:
  - context-menu
  - voice-command
  - event
  - api

shortcuts:
  voice:
    - "reply to mom"
    - "message mom on whatsapp"

parameters:
  - name: message
    type: string
    label: Message
    description: Message content (will be personalized by AI)
    required: false
  
  - name: tone
    type: select
    label: Tone
    description: Message tone
    required: false
    default: warm
    options:
      - value: warm
        label: Warm & Loving
      - value: casual
        label: Casual
      - value: formal
        label: Formal
      - value: auto
        label: Auto (based on Soul)
  
  - name: context
    type: string
    label: Context
    description: Additional context for personalization
    required: false

permissions:
  level: user
  scopes:
    - whatsapp.send
  requiresConsent: true

confirmation:
  required: true
  message: Send WhatsApp message to Mom?

handler: integration.whatsapp.sendMessage

timeout: 30000

ui:
  showInContextMenu: true
  menuLabel: 💬 Message Mom
  menuIcon: whatsapp
  menuOrder: 110
  menuGroup: messaging

integration:
  service: whatsapp
  type: messaging
  auth:
    type: token
    required: true

# MCP definition
mcp:
  name: reply_to_mom_whatsapp
  description: Sends a personalized WhatsApp message to mom based on user's communication style and Soul personality traits
  inputSchema:
    type: object
    properties:
      message:
        type: string
        description: Message to send (will be personalized)
      tone:
        type: string
        enum: [warm, casual, formal, auto]
        description: Desired tone of the message
      context:
        type: string
        description: Additional context for personalization
    required: []

